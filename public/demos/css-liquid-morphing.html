<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Liquid Morphing Shape Demo</title>
  <style>
    body { background: #fdfbfb; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .blob {
      width: 300px;
      height: 300px;
      background: linear-gradient(45deg, #f43f5e, #f97316);
      box-shadow: 0 20px 40px rgba(244, 63, 94, 0.3);
      animation: morph 8s ease-in-out infinite;
      border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
      display: flex; justify-content: center; align-items: center;
      color: white; font-family: sans-serif; font-size: 2rem; font-weight: bold;
    }
    @keyframes morph {
      0%   { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; transform: rotate(0deg); }
      50%  { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
      100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="blob">Fluid</div>
</body>
</html>
