<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Melting Ice Cream Card</title>
  <style>
    body { background: #fef08a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif;}
    
    .card {
      width: 250px;
      height: 350px;
      background: white;
      border-radius: 100px 100px 20px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      position: relative;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 30px;
      box-sizing: border-box;
      text-align: center;
    }
    
    /* The Ice Cream Scoop Top */
    .scoop {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 150px;
      background: #fbcfe8; /* Strawberry */
      border-radius: 100px 100px 20px 20px;
      transition: height 1.5s cubic-bezier(0.4, 0, 0.2, 1), background 1s;
      z-index: 1;
    }
    
    /* The drips */
    .drip {
      position: absolute;
      bottom: -10px;
      background: inherit;
      border-radius: 0 0 20px 20px;
      transition: height 2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .d1 { width: 30px; height: 15px; left: 40px; }
    .d2 { width: 40px; height: 25px; left: 90px; }
    .d3 { width: 25px; height: 10px; right: 40px; }
    
    /* The Melt Actions */
    .card:hover .scoop { height: 220px; background: #f9a8d4; }
    .card:hover .d1 { height: 60px; transition-delay: 0.2s;}
    .card:hover .d2 { height: 90px; transition-delay: 0.1s;}
    .card:hover .d3 { height: 40px; transition-delay: 0.3s;}
    
    h3 { z-index: 2; margin: 0; color: #db2777;}
    p { z-index: 2; color: #6b7280; font-size: 0.9rem;}
  </style>
</head>
<body>
  <div class="card">
    <div class="scoop">
      <div class="drip d1"></div>
      <div class="drip d2"></div>
      <div class="drip d3"></div>
    </div>
    <h3>Strawberry UI</h3>
    <p>Everything melts eventually. Hover to accelerate global warming.</p>
  </div>
</body>
</html>
