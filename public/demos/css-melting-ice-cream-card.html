<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="canonical" href="https://codescompiler.com/blog/css-melting-ice-cream-card/" />
  <script>
    if (window.self === window.top) {
      window.location.replace('/blog-demo/' + window.location.pathname.split('/').pop().replace('.html', '') + '/');
    }
  </script>
  <meta charset="UTF-8">
  <title>Melting Ice Cream Hover Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      background: #f1f3fa; /* Light bluish-purple background */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Poppins', sans-serif;
    }
    
    .card {
      width: 320px;
      background: #fff8e7; /* Waffle cone cream */
      /* Waffle texture */
      background-image: 
        linear-gradient(45deg, rgba(0,0,0,0.02) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.02) 75%, rgba(0,0,0,0.02)), 
        linear-gradient(45deg, rgba(0,0,0,0.02) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.02) 75%, rgba(0,0,0,0.02));
      background-size: 40px 40px;
      background-position: 0 0, 20px 20px;
      border-radius: 36px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      position: relative;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      padding: 0;
      box-sizing: border-box;
      margin-top: 50px;
      transition: transform 0.4s ease;
    }

    .card:hover {
      transform: translateY(-10px);
    }
    
    /* Ice Cream Top */
    .scoop {
      position: absolute;
      top: -60px;
      left: -10px;
      right: -10px;
      height: 220px;
      background: #ff9fb8;
      border-radius: 60px 60px 20px 20px;
      z-index: 10;
      /* 3D shading effect */
      box-shadow: 
        inset -10px -10px 20px rgba(0,0,0,0.05),
        inset 10px 10px 20px rgba(255,255,255,0.6),
        0 15px 25px rgba(255, 159, 184, 0.4);
      transition: height 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Drips */
    .drip {
      position: absolute;
      background: #ff9fb8;
      border-radius: 0 0 30px 30px;
      bottom: -15px;
      transition: height 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: inset -5px -5px 10px rgba(0,0,0,0.05), inset 5px 0 10px rgba(255,255,255,0.4), 0 10px 15px rgba(255, 159, 184, 0.4);
    }

    /* Gooey connectors between drips (using pseudo elements) */
    .drip::before {
      content: '';
      position: absolute;
      top: 0;
      left: -15px;
      width: 15px;
      height: 15px;
      background: transparent;
      border-top-right-radius: 15px;
      box-shadow: 5px -5px 0 0 #ff9fb8;
    }
    .drip::after {
      content: '';
      position: absolute;
      top: 0;
      right: -15px;
      width: 15px;
      height: 15px;
      background: transparent;
      border-top-left-radius: 15px;
      box-shadow: -5px -5px 0 0 #ff9fb8;
    }

    .d1 { width: 35px; height: 30px; left: 30px; }
    .d2 { width: 45px; height: 50px; left: 100px; }
    .d3 { width: 30px; height: 25px; right: 80px; }
    .d4 { width: 25px; height: 80px; right: 25px; transition-delay: 0.1s; }
    
    /* Melt Animation */
    .card:hover .scoop { height: 240px; }
    .card:hover .d1 { height: 60px; transition-delay: 0.1s;}
    .card:hover .d2 { height: 110px; transition-delay: 0.2s;}
    .card:hover .d3 { height: 50px; transition-delay: 0.15s;}
    .card:hover .d4 { height: 130px; transition-delay: 0.25s;}

    /* Sprinkles */
    .sprinkle { position: absolute; width: 12px; height: 4px; border-radius: 4px; box-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
    .s1 { background: #ffd166; top: 80px; left: 60px; transform: rotate(30deg); }
    .s2 { background: #06d6a0; top: 50px; left: 120px; transform: rotate(-45deg); }
    .s3 { background: #ef476f; top: 110px; left: 160px; transform: rotate(15deg); }
    .s4 { background: #118ab2; top: 70px; right: 80px; transform: rotate(-20deg); }
    .s5 { background: #fff; top: 120px; right: 40px; transform: rotate(60deg); }

    /* Cherry */
    .cherry {
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 40px;
      background: radial-gradient(circle at 30% 30%, #ff4d4d, #cc0000);
      border-radius: 50%;
      box-shadow: 0 10px 15px rgba(204,0,0,0.4), inset -5px -5px 10px rgba(0,0,0,0.2);
    }
    .cherry::before { /* Stem */
      content: '';
      position: absolute;
      top: -20px;
      left: 20px;
      width: 25px;
      height: 25px;
      border-top: 3px solid #4a2e1b;
      border-left: 3px solid #4a2e1b;
      border-top-left-radius: 25px;
      transform: rotate(20deg);
    }

    /* Content Area */
    .content {
      padding: 190px 35px 40px; /* Space for the scoop */
      position: relative;
      z-index: 5;
    }

    .badge {
      display: inline-block;
      padding: 4px 14px;
      border: 1px solid #ff477e;
      color: #ff477e;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 15px;
    }

    h3 {
      font-size: 32px;
      font-weight: 800;
      color: #ff477e;
      margin: 0;
      line-height: 1.1;
    }
    
    h4 {
      font-size: 22px;
      font-weight: 800;
      color: #3b2c28;
      margin: 5px 0 15px 0;
    }

    p {
      color: #8c7b77;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 25px;
      font-weight: 400;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #ff477e;
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      box-shadow: 0 8px 20px rgba(255, 71, 126, 0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(255, 71, 126, 0.4);
    }

    .btn-icon {
      background: white;
      color: #ff477e;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 800;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="scoop">
      <div class="cherry"></div>
      <div class="sprinkle s1"></div>
      <div class="sprinkle s2"></div>
      <div class="sprinkle s3"></div>
      <div class="sprinkle s4"></div>
      <div class="sprinkle s5"></div>
      
      <div class="drip d1"></div>
      <div class="drip d2"></div>
      <div class="drip d3"></div>
      <div class="drip d4"></div>
    </div>
    
    <div class="content">
      <div class="badge">Yummy!</div>
      <h3>Strawberry</h3>
      <h4>Ice Cream</h4>
      <p>A sweet blend of fresh strawberries and creamy goodness.</p>
      <a href="#" class="btn">
        Explore Flavor 
        <span class="btn-icon">→</span>
      </a>
    </div>
  </div>
</body>
</html>
