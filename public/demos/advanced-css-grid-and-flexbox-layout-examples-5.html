<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="canonical" href="https://codescompiler.com/blog/advanced-css-grid-and-flexbox-layout-examples-5/" />
  <script>
    if (window.self === window.top) {
      window.location.replace('/blog-demo/' + window.location.pathname.split('/').pop().replace('.html', '') + '/');
    }
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced CSS Grid and Flexbox Layout Examples | Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background-color: #0f172a;
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .bento-container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, 200px);
      gap: 1.5rem;
      max-width: 1100px;
      width: 100%;
    }

    .bento-box {
      background: rgba(30, 41, 59, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 1.5rem;
      backdrop-filter: blur(10px);
      transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .bento-box:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
      background: rgba(30, 41, 59, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    /* Grid Span Utilities */
    .span-col-2 { grid-column: span 2; }
    .span-col-3 { grid-column: span 3; }
    .span-row-2 { grid-row: span 2; }

    /* Specific Box Styling (Using Flexbox) */
    .profile-card {
      justify-content: center;
      align-items: center;
      text-align: center;
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      color: white;
    }

    .profile-card img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.3);
      margin-bottom: 1rem;
    }

    .stats-card {
      justify-content: space-between;
    }
    
    .stats-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #94a3b8;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .stats-value {
      font-size: 3rem;
      font-weight: 700;
      color: #38bdf8;
      margin-top: auto;
    }

    .chart-card {
      justify-content: flex-start;
    }

    .chart-bars {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      height: 100%;
      margin-top: 1.5rem;
    }

    .bar {
      flex: 1;
      background: #334155;
      border-radius: 6px 6px 0 0;
      position: relative;
      overflow: hidden;
    }

    .bar-fill {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: #10b981;
      border-radius: 6px 6px 0 0;
    }

    .social-links {
      display: flex;
      flex-direction: row;
      justify-content: space-around;
      align-items: center;
      height: 100%;
    }

    .social-icon {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #334155;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.5rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .social-icon:hover {
      background: #f43f5e;
      color: white;
      transform: scale(1.1);
    }

    .project-card {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 1.5rem;
    }

    .project-img {
      width: 120px;
      height: 120px;
      border-radius: 16px;
      background: #cbd5e1;
      flex-shrink: 0;
      background-image: url('https://images.unsplash.com/photo-1555066931-4365d14bab8c?ixlib=rb-4.0.3&auto=format&fit=crop&w=200&q=80');
      background-size: cover;
      background-position: center;
    }

    .project-info h3 {
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
    }

    .project-info p {
      color: #94a3b8;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .tags {
      display: flex;
      gap: 8px;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .tag {
      background: rgba(56, 189, 248, 0.1);
      color: #38bdf8;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    /* Decorative Element */
    .gradient-blob {
      position: absolute;
      top: -50px;
      right: -50px;
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, rgba(168,85,247,0.4) 0%, rgba(0,0,0,0) 70%);
      border-radius: 50%;
      z-index: 0;
    }

    .bento-box > * {
      z-index: 1;
    }

    /* Responsive Design */
    @media (max-width: 1024px) {
      .bento-container {
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: auto;
      }
      .chart-card { grid-column: span 3; grid-row: span 1; height: 250px; }
    }

    @media (max-width: 768px) {
      .bento-container {
        grid-template-columns: repeat(2, 1fr);
      }
      .project-card, .social-links-box, .chart-card {
        grid-column: span 2;
      }
      .span-col-2 { grid-column: span 2; }
      .span-row-2 { grid-row: auto; height: 250px; }
    }

    @media (max-width: 480px) {
      .bento-container {
        grid-template-columns: 1fr;
      }
      .bento-box { grid-column: span 1 !important; grid-row: auto !important; height: auto !important; min-height: 200px; }
      .project-card { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>

  <div class="bento-container">
    
    <!-- Profile Card -->
    <div class="bento-box profile-card span-row-2">
      <img src="https://i.pravatar.cc/150?img=68" alt="Profile">
      <h2>Alex Developer</h2>
      <p style="opacity: 0.8; margin-top: 5px; font-size: 0.9rem;">Frontend Engineer</p>
      <div class="tags" style="justify-content: center; margin-top: auto;">
        <span class="tag" style="background: rgba(255,255,255,0.2); color: white;">React</span>
        <span class="tag" style="background: rgba(255,255,255,0.2); color: white;">CSS Grid</span>
      </div>
    </div>

    <!-- Stats Card 1 -->
    <div class="bento-box stats-card">
      <div class="gradient-blob"></div>
      <div class="stats-header">
        <span>Total Views</span>
        <span>👁️</span>
      </div>
      <div class="stats-value">24.5K</div>
    </div>

    <!-- Stats Card 2 -->
    <div class="bento-box stats-card">
      <div class="gradient-blob" style="background: radial-gradient(circle, rgba(16,185,129,0.2) 0%, rgba(0,0,0,0) 70%);"></div>
      <div class="stats-header">
        <span>Completion Rate</span>
        <span>📈</span>
      </div>
      <div class="stats-value" style="color: #10b981;">92%</div>
    </div>

    <!-- Chart Card -->
    <div class="bento-box chart-card span-col-2 span-row-2">
      <h3>Weekly Activity</h3>
      <div class="chart-bars">
        <div class="bar"><div class="bar-fill" style="height: 40%; background: #3b82f6;"></div></div>
        <div class="bar"><div class="bar-fill" style="height: 70%; background: #8b5cf6;"></div></div>
        <div class="bar"><div class="bar-fill" style="height: 50%; background: #ec4899;"></div></div>
        <div class="bar"><div class="bar-fill" style="height: 90%; background: #10b981;"></div></div>
        <div class="bar"><div class="bar-fill" style="height: 65%; background: #f59e0b;"></div></div>
        <div class="bar"><div class="bar-fill" style="height: 30%; background: #ef4444;"></div></div>
        <div class="bar"><div class="bar-fill" style="height: 80%; background: #06b6d4;"></div></div>
      </div>
    </div>

    <!-- Social Links -->
    <div class="bento-box span-col-2 social-links-box">
      <div class="social-links">
        <div class="social-icon">🐦</div>
        <div class="social-icon">🐙</div>
        <div class="social-icon">💼</div>
        <div class="social-icon">🏀</div>
      </div>
    </div>

    <!-- Project Highlight -->
    <div class="bento-box span-col-3 project-card">
      <div class="project-img"></div>
      <div class="project-info">
        <h3>Bento Box Dashboard</h3>
        <p>A modern, responsive dashboard UI built entirely with CSS Grid and Flexbox. Demonstrating advanced spanning and gap techniques.</p>
        <div class="tags">
          <span class="tag">UI/UX</span>
          <span class="tag">Web Design</span>
          <span class="tag">Layouts</span>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
