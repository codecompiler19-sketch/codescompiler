<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="canonical" href="https://codescompiler.com/blog/password-strength-checker-using-javascript-3/" />
  <script>
    if (window.self === window.top && window.location.protocol !== 'file:' && !window.location.hostname.includes('localhost') && !window.location.hostname.includes('127.0.0.1')) {
      window.location.replace('/blog-demo/' + window.location.pathname.split('/').pop().replace('.html', '') + '/');
    }
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Strength Checker - Live Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0d0d0d 0%, #1a0a2e 50%, #0a1628 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container { width: 100%; max-width: 460px; }
    h1 { text-align: center; color: #fff; font-size: 1.7rem; font-weight: 800; margin-bottom: 0.3rem; }
    .subtitle { text-align: center; color: rgba(255,255,255,0.45); font-size: 0.82rem; margin-bottom: 2rem; }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 22px;
      padding: 2.2rem;
      backdrop-filter: blur(20px);
    }
    .form-group { margin-bottom: 1.5rem; }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 700;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 0.5rem;
    }
    .input-wrap { position: relative; }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 0.85rem 3.2rem 0.85rem 1rem;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: all 0.3s;
      letter-spacing: 0.05em;
    }
    input::placeholder { color: rgba(255,255,255,0.3); letter-spacing: normal; }
    input:focus {
      background: rgba(255,255,255,0.11);
      border-color: #7c3aed;
      box-shadow: 0 0 0 4px rgba(124,58,237,0.2);
    }
    .toggle-eye {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      font-size: 1.2rem;
      padding: 4px;
      transition: color 0.2s;
    }
    .toggle-eye:hover { color: rgba(255,255,255,0.9); }

    /* Strength meter */
    .strength-track {
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      margin-top: 0.7rem;
      overflow: hidden;
    }
    .strength-bar {
      height: 100%;
      border-radius: 10px;
      width: 0%;
      transition: width 0.4s cubic-bezier(0.4,0,0.2,1), background 0.4s;
    }
    .strength-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.5rem;
    }
    .strength-text {
      font-size: 0.82rem;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      transition: color 0.3s;
    }
    .strength-score {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
    }

    /* Criteria checklist */
    .criteria-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin-top: 1rem;
    }
    .criterion {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.45);
      transition: color 0.25s;
      padding: 0.4rem 0.6rem;
      border-radius: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
    }
    .criterion.met {
      color: #86efac;
      background: rgba(34,197,94,0.1);
      border-color: rgba(34,197,94,0.25);
    }
    .criterion-icon {
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    /* Entropy display */
    .entropy-box {
      background: rgba(124,58,237,0.12);
      border: 1px solid rgba(124,58,237,0.25);
      border-radius: 10px;
      padding: 0.8rem 1rem;
      margin-top: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .entropy-label { font-size: 0.77rem; color: rgba(255,255,255,0.5); }
    .entropy-value { font-size: 1rem; font-weight: 800; color: #c4b5fd; }

    /* Suggestions */
    .suggestions {
      margin-top: 1rem;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.5);
      line-height: 1.6;
      min-height: 1.6em;
      padding: 0.5rem 0.7rem;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.07);
      transition: opacity 0.3s;
    }

    /* Generator */
    .gen-btn {
      width: 100%;
      padding: 0.75rem;
      background: rgba(124,58,237,0.2);
      color: #c4b5fd;
      border: 1px solid rgba(124,58,237,0.4);
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      margin-top: 1.2rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .gen-btn:hover { background: rgba(124,58,237,0.35); color: #fff; transform: translateY(-1px); }

    .confirm-group { margin-top: 1.5rem; }
    .match-badge {
      display: inline-block;
      font-size: 0.78rem;
      margin-top: 0.5rem;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 700;
    }
    .match-badge.ok { background: rgba(34,197,94,0.15); color: #86efac; border: 1px solid rgba(34,197,94,0.3); }
    .match-badge.no { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔒 Password Strength</h1>
    <p class="subtitle">Real-time strength checker using JavaScript</p>

    <div class="card">
      <div class="form-group">
        <label>Create Password</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="Type a password..." autocomplete="new-password">
          <button class="toggle-eye" type="button" onclick="toggleVis('password', 'eye1')" id="eye1">👁</button>
        </div>
        <div class="strength-track">
          <div class="strength-bar" id="strengthBar"></div>
        </div>
        <div class="strength-label">
          <span class="strength-text" id="strengthText">Start typing…</span>
          <span class="strength-score" id="strengthScore"></span>
        </div>
        <div class="criteria-grid" id="criteriaGrid">
          <div class="criterion" id="c-length"><span class="criterion-icon">○</span> 8+ characters</div>
          <div class="criterion" id="c-upper"><span class="criterion-icon">○</span> Uppercase (A-Z)</div>
          <div class="criterion" id="c-lower"><span class="criterion-icon">○</span> Lowercase (a-z)</div>
          <div class="criterion" id="c-number"><span class="criterion-icon">○</span> Number (0-9)</div>
          <div class="criterion" id="c-special"><span class="criterion-icon">○</span> Special char (!@#…)</div>
          <div class="criterion" id="c-long"><span class="criterion-icon">○</span> 12+ characters</div>
        </div>
        <div class="entropy-box">
          <span class="entropy-label">🧮 Estimated Entropy</span>
          <span class="entropy-value" id="entropyVal">0 bits</span>
        </div>
        <div class="suggestions" id="suggestions">💡 Start typing to see suggestions...</div>
      </div>

      <button class="gen-btn" type="button" onclick="generatePassword()">🎲 Generate Strong Password</button>

      <div class="confirm-group">
        <label>Confirm Password</label>
        <div class="input-wrap">
          <input type="password" id="confirm" placeholder="Repeat your password..." autocomplete="new-password">
          <button class="toggle-eye" type="button" onclick="toggleVis('confirm', 'eye2')" id="eye2">👁</button>
        </div>
        <div id="matchBadge"></div>
      </div>
    </div>
  </div>

  <script>
    const colors = ['#ef4444','#f97316','#eab308','#22c55e','#10b981'];
    const labels = ['Very Weak','Weak','Fair','Strong','Very Strong'];
    const widths = ['15%','32%','55%','78%','100%'];

    const criteria = [
      { id: 'c-length',  test: p => p.length >= 8 },
      { id: 'c-upper',   test: p => /[A-Z]/.test(p) },
      { id: 'c-lower',   test: p => /[a-z]/.test(p) },
      { id: 'c-number',  test: p => /[0-9]/.test(p) },
      { id: 'c-special', test: p => /[^A-Za-z0-9]/.test(p) },
      { id: 'c-long',    test: p => p.length >= 12 },
    ];

    function calcScore(p) {
      let s = 0;
      if (p.length >= 8) s++;
      if (p.length >= 12) s++;
      if (/[A-Z]/.test(p)) s++;
      if (/[a-z]/.test(p)) s++;
      if (/[0-9]/.test(p)) s++;
      if (/[^A-Za-z0-9]/.test(p)) s++;
      return Math.min(Math.floor((s / 6) * 5), 4);
    }

    function calcEntropy(p) {
      let pool = 0;
      if (/[a-z]/.test(p)) pool += 26;
      if (/[A-Z]/.test(p)) pool += 26;
      if (/[0-9]/.test(p)) pool += 10;
      if (/[^A-Za-z0-9]/.test(p)) pool += 32;
      if (pool === 0) return 0;
      return Math.round(p.length * Math.log2(pool));
    }

    function getSuggestion(p) {
      if (!p) return '💡 Start typing to see suggestions...';
      if (p.length < 8) return '💡 Make it at least 8 characters long.';
      if (!/[A-Z]/.test(p)) return '💡 Add at least one uppercase letter (e.g., A, B, C).';
      if (!/[0-9]/.test(p)) return '💡 Include a number to boost strength.';
      if (!/[^A-Za-z0-9]/.test(p)) return '💡 Add a special character like !, @, #, $.';
      if (p.length < 12) return '💡 Longer is better — aim for 12+ characters!';
      return '✅ Great password! Looks very secure.';
    }

    document.getElementById('password').addEventListener('input', function() {
      const p = this.value;
      const score = p.length ? calcScore(p) : -1;

      const bar = document.getElementById('strengthBar');
      const text = document.getElementById('strengthText');
      const scoreEl = document.getElementById('strengthScore');
      const entropyEl = document.getElementById('entropyVal');

      if (!p.length) {
        bar.style.width = '0%';
        text.textContent = 'Start typing…';
        text.style.color = 'rgba(255,255,255,0.5)';
        scoreEl.textContent = '';
        entropyEl.textContent = '0 bits';
      } else {
        bar.style.width = widths[score];
        bar.style.background = colors[score];
        text.textContent = labels[score];
        text.style.color = colors[score];
        scoreEl.textContent = `Score: ${score + 1}/5`;
        const entropy = calcEntropy(p);
        entropyEl.textContent = `${entropy} bits`;
      }

      criteria.forEach(c => {
        const el = document.getElementById(c.id);
        const met = p && c.test(p);
        el.classList.toggle('met', met);
        el.querySelector('.criterion-icon').textContent = met ? '✓' : '○';
      });

      document.getElementById('suggestions').textContent = getSuggestion(p);
      checkMatch();
    });

    document.getElementById('confirm').addEventListener('input', checkMatch);

    function checkMatch() {
      const p = document.getElementById('password').value;
      const c = document.getElementById('confirm').value;
      const badge = document.getElementById('matchBadge');
      if (!c) { badge.innerHTML = ''; return; }
      if (p === c) {
        badge.innerHTML = '<span class="match-badge ok">✓ Passwords match!</span>';
      } else {
        badge.innerHTML = '<span class="match-badge no">✗ Passwords do not match</span>';
      }
    }

    function toggleVis(id, btnId) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
      document.getElementById(btnId).textContent = input.type === 'password' ? '👁' : '🙈';
    }

    function generatePassword() {
      const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      const lower = 'abcdefghijklmnopqrstuvwxyz';
      const digits = '0123456789';
      const special = '!@#$%^&*()-_=+[]{}|;:,.<>?';
      const all = upper + lower + digits + special;
      let pass = '';
      pass += upper[Math.floor(Math.random() * upper.length)];
      pass += lower[Math.floor(Math.random() * lower.length)];
      pass += digits[Math.floor(Math.random() * digits.length)];
      pass += special[Math.floor(Math.random() * special.length)];
      for (let i = 4; i < 16; i++) {
        pass += all[Math.floor(Math.random() * all.length)];
      }
      pass = pass.split('').sort(() => Math.random() - 0.5).join('');
      const input = document.getElementById('password');
      input.value = pass;
      input.dispatchEvent(new Event('input'));
    }
  </script>
</body>
</html>
