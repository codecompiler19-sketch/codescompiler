<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Preloaders - Demo</title>
  <style>
    body { background: #1a1b26; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 80px; }
    
    .spinner { width: 48px; height: 48px; border: 4px solid rgba(4, 170, 109, 0.2); border-left-color: #04AA6D; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .bouncing-dots { display: flex; gap: 8px; }
    .bouncing-dots div { width: 12px; height: 12px; background: #3b82f6; border-radius: 50%; animation: bounce 0.6s infinite alternate; }
    .bouncing-dots div:nth-child(2) { animation-delay: 0.2s; }
    .bouncing-dots div:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { to { transform: translateY(-16px); opacity: 0.5; } }

    .pulse { width: 48px; height: 48px; background: #8b5cf6; border-radius: 50%; animation: pulse-ring 1.2s cubic-bezier(0.25, 0.8, 0.25, 1) infinite; }
    @keyframes pulse-ring { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <div class="bouncing-dots"><div></div><div></div><div></div></div>
  <div class="pulse"></div>
</body>
</html>
