<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Buttons - Demo</title>
  <style>
    body { background: #1a1b26; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 40px; font-family: sans-serif; }
    
    .btn-neon { position: relative; padding: 15px 30px; color: #04AA6D; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; overflow: hidden; transition: 0.2s; background: transparent; border: 2px solid #04AA6D; border-radius: 4px; cursor: pointer; }
    .btn-neon:hover { color: #111; background: #04AA6D; box-shadow: 0 0 10px #04AA6D, 0 0 40px #04AA6D; }

    .btn-3d { padding: 15px 30px; background-color: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; box-shadow: 0 6px 0 #1d4ed8; position: relative; transition: all 0.1s; cursor: pointer;}
    .btn-3d:active { box-shadow: 0 2px 0 #1d4ed8; transform: translateY(4px); }

    .btn-gradient { background-image: linear-gradient(to right, #f43f5e, #f97316, #f43f5e); background-size: 200%; color: white; padding: 15px 30px; border-radius: 30px; border: none; font-size: 16px; font-weight: bold; transition: 0.5s; cursor: pointer; }
    .btn-gradient:hover { background-position: right center; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(244, 63, 94, 0.4); }
  </style>
</head>
<body>
  <button class="btn-neon">Neon Button</button>
  <button class="btn-3d">Push Button</button>
  <button class="btn-gradient">Swipe Button</button>
</body>
</html>
