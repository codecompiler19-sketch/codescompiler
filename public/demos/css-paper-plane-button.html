<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Paper Plane Button</title>
  <style>
    body { background: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif;}
    
    .send-btn {
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #10b981;
      color: white;
      font-size: 1.2rem;
      font-weight: bold;
      padding: 15px 40px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
      transition: background 0.4s;
    }
    
    .icon {
      font-size: 1.4rem;
      transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55), opacity 0.6s;
    }
    
    /* When hovered, we launch the plane icon visually out of the button bounds */
    .send-btn:hover .icon {
      transform: translate(60px, -60px) scale(0.5);
      opacity: 0;
    }
    
    .send-btn:hover { background: #0ea5e9; box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);}
    
    /* Optional: Spawn a new plane ready to fire! */
    .send-btn::before {
      content: '✈';
      position: absolute;
      right: 40px; /* same general position as original */
      transform: translate(-100px, 100px) scale(0.5); /* Start outside lower left */
      opacity: 0;
      transition: transform 0s 0.6s; /* Reset instantly after timeout */
    }
    
    .send-btn:hover::before {
      transform: translate(0, 0) scale(1);
      opacity: 1;
      transition: transform 0.4s 0.2s ease, opacity 0.4s 0.2s; /* Fly into place */
    }
  </style>
</head>
<body>
  <button class="send-btn">
    Send Message <span class="icon">✈</span>
  </button>
</body>
</html>
