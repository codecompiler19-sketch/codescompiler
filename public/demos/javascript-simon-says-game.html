<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="canonical" href="https://codescompiler.com/blog/javascript-simon-says-game/" />
  <script>
    if (window.self === window.top && window.location.protocol !== 'file:' && !window.location.hostname.includes('localhost') && !window.location.hostname.includes('127.0.0.1')) {
      window.location.replace('/blog-demo/' + window.location.pathname.split('/').pop().replace('.html', '') + '/');
    }
  </script>
  <meta charset="UTF-8">
  <title>Simon Says - Demo</title>
  <style>
    body { background: #121212; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; margin: 0; }
    h1 { font-size: 3rem; margin-bottom: 40px; text-align: center;}
    .game-board { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .btn { width: 140px; height: 140px; border-radius: 20px; border: 10px solid #222; cursor: pointer; transition: 0.1s; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    .green { background: #00a74a; }
    .red { background: #9f0f17; }
    .yellow { background: #cca707; }
    .blue { background: #094a8f; }
    .pressed { box-shadow: 0 0 20px rgba(255,255,255,0.8); opacity: 0.5; transform: scale(0.95); }
    .game-over { background: red; }
    .start-btn { margin-top: 40px; padding: 15px 30px; font-size: 20px; cursor: pointer; border: none; border-radius: 8px; background: whitesmoke; }
  </style>
</head>
<body>
  <h1 id="level-title">Press Start to Play</h1>
  <p style="color: #ccc; margin-top: -20px; margin-bottom: 30px; text-align: center;">
    <strong>How to Play:</strong> Watch the sequence of flashing colors and repeat it by clicking the buttons in the exact same order!
  </p>
  <div class="game-board">
    <div class="btn green" id="green"></div>
    <div class="btn red" id="red"></div>
    <div class="btn yellow" id="yellow"></div>
    <div class="btn blue" id="blue"></div>
  </div>
  <button class="start-btn" id="startBtn">Start Game</button>

  <script>
    let gameSequence = [], userSequence = [], level = 0, playing = false, animating = false;
    const colors = ["green", "red", "yellow", "blue"];

    document.getElementById('startBtn').addEventListener('click', () => {
      if(!playing) { 
        playing = true; 
        document.getElementById('startBtn').style.display='none'; 
        nextSequence(); 
      }
    });

    function nextSequence() {
      userSequence = [];
      level++;
      document.getElementById("level-title").innerText = `Level ${level}`;
      
      const randomColor = colors[Math.floor(Math.random() * 4)];
      gameSequence.push(randomColor);
      
      animating = true;
      let i = 0;
      // Play the full sequence back to the user
      const interval = setInterval(() => {
        animatePress(gameSequence[i]);
        i++;
        if (i >= gameSequence.length) {
          clearInterval(interval);
          animating = false; // Allow user to click now
        }
      }, 600); // 600ms delay between flashes
    }

    document.querySelectorAll('.btn').forEach(b => {
      b.addEventListener('click', function() {
        // Prevent clicking if game is over or sequence is still playing
        if(!playing || animating) return;
        
        let color = this.id;
        userSequence.push(color);
        animatePress(color);
        checkAnswer(userSequence.length-1);
      });
    });

    function checkAnswer(currentLevel) {
      if(gameSequence[currentLevel] === userSequence[currentLevel]) {
        // If they got the whole sequence right, go to next level
        if(userSequence.length === gameSequence.length) {
          setTimeout(nextSequence, 1000);
        }
      } else {
        // Wrong answer
        document.body.classList.add("game-over");
        document.getElementById("level-title").innerText = "Game Over! Score: " + (level-1);
        setTimeout(() => document.body.classList.remove("game-over"), 200);
        
        document.getElementById('startBtn').style.display='block';
        document.getElementById('startBtn').innerText='Restart';
        level = 0; 
        gameSequence = []; 
        playing = false;
      }
    }

    function animatePress(c) {
      const el = document.getElementById(c);
      el.classList.add("pressed");
      setTimeout(() => el.classList.remove("pressed"), 200);
    }
  </script>
</body>
</html>
