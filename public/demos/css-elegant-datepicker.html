<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Datepicker UI</title>
  <style>
    body { background: #fdfbfb; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
    .calendar { width: 350px; background: white; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); padding: 25px; border: 1px solid #f3f4f6;}
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 1.2rem; font-weight: bold; color: #111;}
    .btn { background: #f3f4f6; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer;}
    .btn:hover { background: #e5e7eb; }
    
    .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; color: #9ca3af; margin-bottom: 10px; font-size: 0.9rem;}
    .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
    
    .day { width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; border-radius: 50%; cursor: pointer; color: #374151; transition: 0.2s;}
    .day:hover { background: #f3f4f6; }
    .day.muted { color: #d1d5db; }
    .day.active { background: #8b5cf6; color: white; font-weight: bold; box-shadow: 0 4px 10px rgba(139,92,246,0.3);}
  </style>
</head>
<body>
  <div class="calendar">
    <div class="header">
      <button class="btn">❮</button>
      <div>April 2026</div>
      <button class="btn">❯</button>
    </div>
    
    <div class="weekdays">
      <div>Su</div><div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div>
    </div>
    
    <div class="days" id="grid">
      <!-- Dummy data for UI showcase -->
      <div class="day muted">29</div><div class="day muted">30</div><div class="day muted">31</div>
      <div class="day active">1</div><div class="day">2</div><div class="day">3</div><div class="day">4</div>
      <div class="day">5</div><div class="day">6</div><div class="day">7</div><div class="day">8</div><div class="day">9</div><div class="day">10</div><div class="day">11</div>
    </div>
  </div>
  <script>
    // JS just to fill the rest of the visual grid
    const grid = document.getElementById('grid');
    for(let i=12; i<=30; i++) {
      grid.innerHTML += `<div class="day" onclick="pick(this)">${i}</div>`;
    }
    grid.innerHTML += `<div class="day muted">1</div><div class="day muted">2</div>`;
    
    function pick(el) {
      document.querySelectorAll('.day').forEach(d => d.classList.remove('active'));
      el.classList.add('active');
    }
  </script>
</body>
</html>
