<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RGB Snap Shift</title>
  <style>
    body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    
    .glitch-wrapper {
      position: relative;
      width: 400px;
      height: 500px;
      cursor: pointer;
    }
    
    .base-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: relative;
      z-index: 1;
    }
    
    /* The identical copy overlaid! */
    .glitch-overlay {
      position: absolute;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?q=80&w=600&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      
      /* Pure CSS color burning forces the chromatic split logic dynamically! */
      mix-blend-mode: color-burn;
      opacity: 0;
      transform: translateX(0);
      transition: opacity 0.1s, transform 0.15s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      filter: drop-shadow(8px 0 0 red) drop-shadow(-8px 0 0 cyan);
      z-index: 2;
      pointer-events: none;
    }
    
    /* The violent shift event */
    .glitch-wrapper:hover .glitch-overlay {
      opacity: 0.8;
      transform: translateX(12px) scale(1.02);
    }
    
    /* Bonus subtle shift on the base image */
    .glitch-wrapper:hover .base-image {
      filter: contrast(120%) saturate(150%);
    }
  </style>
</head>
<body>
  <div class="glitch-wrapper">
    <!-- Base duplicate is generated by the overlay CSS class -->
    <img src="https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?q=80&w=600&auto=format&fit=crop" class="base-image" alt="Fashion Portrait">
    <div class="glitch-overlay"></div>
  </div>
</body>
</html>
