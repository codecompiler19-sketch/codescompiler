<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Login Form</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { margin: 0; padding: 0; }
        .glass-login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(45deg, #fc466b, #3f5efb);
            font-family: 'Poppins', sans-serif;
            position: relative;
            overflow: hidden;
        }
        .glass-circles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
            z-index: 1;
        }
        .glass-circles li {
            position: absolute;
            display: block;
            list-style: none;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
            animation: animate 25s linear infinite;
            bottom: -150px;
            border-radius: 50%;
        }
        .glass-circles li:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .glass-circles li:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
        .glass-circles li:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
        .glass-circles li:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
        .glass-circles li:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; }
        @keyframes animate {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 0; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; }
        }
        .glass-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 400px;
            padding: 50px 40px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-sizing: border-box;
        }
        .glass-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .glass-header h2 {
            margin: 0 0 10px;
            color: #fff;
            font-size: 28px;
            letter-spacing: 1px;
        }
        .glass-header p {
            color: rgba(255, 255, 255, 0.8);
            margin: 0;
            font-size: 14px;
        }
        .glass-input-wrapper {
            position: relative;
            margin-bottom: 25px;
        }
        .glass-input-wrapper i {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.8);
        }
        .glass-input-wrapper input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            color: #fff;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        .glass-input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        .glass-input-wrapper input:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }
        .glass-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.9);
        }
        .glass-options a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
        }
        .glass-options a:hover {
            text-decoration: underline;
        }
        .glass-btn {
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background: #fff;
            color: #3f5efb;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .glass-btn:hover {
            background: rgba(255,255,255,0.9);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .glass-footer {
            text-align: center;
            margin-top: 30px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }
        .glass-footer a {
            color: #fff;
            font-weight: bold;
            text-decoration: none;
        }
        .glass-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="glass-login-container">
      <div class="glass-card">
        <div class="glass-header">
          <h2>Hello Again!</h2>
          <p>Log in to your account</p>
        </div>
        <form class="glass-form" id="glass-login">
          <div class="glass-input-wrapper">
            <i class="icon-mail">✉️</i>
            <input type="email" placeholder="Email Address" required>
          </div>
          <div class="glass-input-wrapper">
            <i class="icon-lock">🔒</i>
            <input type="password" placeholder="Password" required>
          </div>
          <div class="glass-options">
            <label><input type="checkbox"> Remember me</label>
            <a href="#">Forgot Password?</a>
          </div>
          <button type="submit" class="glass-btn">Sign In</button>
        </form>
        <div class="glass-footer">
          <p>Don't have an account? <a href="#">Create one</a></p>
        </div>
      </div>
      <ul class="glass-circles">
        <li></li><li></li><li></li><li></li><li></li>
      </ul>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const glassForm = document.getElementById('glass-login');
            if (glassForm) {
                glassForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const btn = glassForm.querySelector('.glass-btn');
                    const originalText = btn.textContent;
                    btn.textContent = 'Processing...';
                    btn.style.opacity = '0.8';
                    
                    setTimeout(() => {
                        btn.textContent = 'Welcome!';
                        btn.style.background = '#4CAF50';
                        btn.style.color = '#fff';
                        
                        setTimeout(() => {
                            btn.textContent = originalText;
                            btn.style.background = '';
                            btn.style.color = '';
                            btn.style.opacity = '1';
                            glassForm.reset();
                        }, 2000);
                    }, 1500);
                });
            }
        });
    </script>
</body>
</html>
