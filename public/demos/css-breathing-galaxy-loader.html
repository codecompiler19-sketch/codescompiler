<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Galaxy Loader Demo</title>
  <style>
    body { background: black; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden;}
    
    .galaxy-container { position: relative; width: 300px; height: 300px; display: flex; justify-content: center; align-items: center;}
    
    /* The Nebula Core */
    .nebula {
      width: 80px; height: 80px;
      background: #c026d3;
      border-radius: 50%;
      filter: blur(30px);
      animation: pulseCore 5s ease-in-out infinite alternate;
      z-index: 2;
    }
    
    /* Second deeper layer */
    .nebula::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: #3b82f6; border-radius: 50%; filter: blur(40px);
      animation: pulseCore 7s ease-in-out infinite alternate-reverse;
    }
    
    @keyframes pulseCore {
      0% { transform: scale(0.8) rotate(0deg); filter: blur(30px) hue-rotate(0deg); opacity: 0.6;}
      100% { transform: scale(2.5) rotate(90deg); filter: blur(50px) hue-rotate(120deg); opacity: 1;}
    }
    
    /* Stars */
    .star { position: absolute; width: 4px; height: 4px; background: white; border-radius: 50%; filter: blur(1px); animation: twinkle 2s infinite alternate; z-index: 1;}
    .s1 { top: 10%; left: 20%; animation-delay: 0.5s;}
    .s2 { top: 80%; left: 80%; animation-delay: 1.2s;}
    .s3 { top: 30%; right: 10%; animation-delay: 0.1s;}
    .s4 { bottom: 20%; left: 30%; animation-delay: 1.8s;}
    
    @keyframes twinkle {
      0% { transform: scale(0.5); opacity: 0.2; }
      100% { transform: scale(1.5); opacity: 1; box-shadow: 0 0 10px white; }
    }
  </style>
</head>
<body>
  <div class="galaxy-container">
    <div class="star s1"></div>
    <div class="star s2"></div>
    <div class="star s3"></div>
    <div class="star s4"></div>
    <div class="nebula"></div>
  </div>
</body>
</html>
