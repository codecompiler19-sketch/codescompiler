<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aurora Blob Demo</title>
  <style>
    body { background: #111; margin: 0; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
    h1 { color: white; font-family: sans-serif; z-index: 10; text-transform: uppercase; letter-spacing: 10px; font-size: 3rem; pointer-events: none; }
    .blob { position: absolute; filter: blur(80px); z-index: -1; opacity: 0.8; animation: moveBlob 15s infinite alternate ease-in-out; border-radius: 50%; }
    .b1 { background: #ff007f; width: 400px; height: 400px; top: 10%; left: 20%; animation-delay: -2s; }
    .b2 { background: #00f0ff; width: 500px; height: 500px; bottom: 10%; right: 10%; animation-delay: -5s; animation-direction: alternate-reverse; }
    .b3 { background: #7000ff; width: 300px; height: 300px; top: 40%; left: 60%; animation-delay: -8s; }
    @keyframes moveBlob {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); }
      100% { transform: translate(150px, 100px) scale(1.3) rotate(45deg); }
    }
  </style>
</head>
<body>
  <h1>Northern Lights</h1>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
</body>
</html>
