<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Saloon Door Split</title>
  <style>
    body { background: #e2e8f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;}
    
    .card {
      width: 300px;
      height: 400px;
      perspective: 1200px;
      position: relative;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    
    .hidden-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0; left: 0;
      z-index: 1; /* Hidden underneath the doors initially */
    }
    
    .door {
      position: absolute;
      top: 0; bottom: 0;
      width: 50%;
      background: #0ea5e9;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      font-size: 2rem;
      font-weight: bold;
      transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 2; /* Sits on top of the image */
      box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
    }
    
    .left-door {
      left: 0;
      transform-origin: left center;
      border-right: 1px solid rgba(0,0,0,0.2);
    }
    
    .right-door {
      right: 0;
      transform-origin: right center;
      border-left: 1px solid rgba(255,255,255,0.2);
    }
    
    /* The swinging hinges */
    .card:hover .left-door {
      transform: rotateY(-115deg);
    }
    
    .card:hover .right-door {
      transform: rotateY(115deg);
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://images.unsplash.com/photo-1542204165-65bf26472b9b?q=80&w=400&auto=format&fit=crop" class="hidden-image" alt="Hidden Scene">
    <div class="door left-door">OP</div>
    <div class="door right-door">EN</div>
  </div>
</body>
</html>
