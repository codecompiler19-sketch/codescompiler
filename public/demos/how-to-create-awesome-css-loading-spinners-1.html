<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="canonical" href="https://codescompiler.com/blog/how-to-create-awesome-css-loading-spinners-1/" />
  <script>
    if (window.self === window.top) {
      window.location.replace('/blog-demo/' + window.location.pathname.split('/').pop().replace('.html', '') + '/');
    }
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Spinners | Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    
    body {
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 50px 20px;
      min-height: 100vh;
    }

    h2 { margin-bottom: 40px; color: #38bdf8; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 30px;
      width: 100%;
      max-width: 800px;
    }

    .spinner-box {
      background: #1e293b;
      height: 200px;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      border: 1px solid #334155;
    }

    .label { color: #94a3b8; font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

    /* Spinner 1: Classic Ring */
    .spinner-ring {
      width: 50px; height: 50px;
      border: 5px solid rgba(56, 189, 248, 0.2);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    /* Spinner 2: Double Orbit */
    .spinner-orbit {
      width: 50px; height: 50px;
      border-radius: 50%;
      border: 4px solid transparent;
      border-top-color: #ec4899;
      border-bottom-color: #ec4899;
      animation: spin 1.5s ease-in-out infinite;
      position: relative;
    }
    .spinner-orbit::before {
      content: ''; position: absolute;
      top: 5px; left: 5px; right: 5px; bottom: 5px;
      border-radius: 50%;
      border: 4px solid transparent;
      border-left-color: #8b5cf6;
      border-right-color: #8b5cf6;
      animation: spin-reverse 1s linear infinite;
    }

    /* Spinner 3: Pulse Radar */
    .spinner-pulse {
      width: 50px; height: 50px;
      background-color: #10b981;
      border-radius: 50%;
      animation: pulse 1.2s infinite cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    /* Spinner 4: Morphing Square */
    .spinner-morph {
      width: 40px; height: 40px;
      background-color: #f59e0b;
      animation: morph 2s infinite ease-in-out;
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
    @keyframes pulse { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
    @keyframes morph {
      0% { border-radius: 0%; transform: rotate(0deg); }
      50% { border-radius: 50%; transform: rotate(180deg) scale(0.8); background-color: #ef4444; }
      100% { border-radius: 0%; transform: rotate(360deg); }
    }

  </style>
</head>
<body>

  <h2>CSS Loading Spinners</h2>

  <div class="grid">
    <div class="spinner-box">
      <div class="spinner-ring"></div>
      <div class="label">Classic Ring</div>
    </div>
    
    <div class="spinner-box">
      <div class="spinner-orbit"></div>
      <div class="label">Double Orbit</div>
    </div>
    
    <div class="spinner-box">
      <div class="spinner-pulse"></div>
      <div class="label">Radar Pulse</div>
    </div>
    
    <div class="spinner-box">
      <div class="spinner-morph"></div>
      <div class="label">Morphing Shape</div>
    </div>
  </div>

</body>
</html>
