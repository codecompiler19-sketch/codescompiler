<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="canonical" href="https://codescompiler.com/blog/build-a-notes-app-using-javascript-and-local-storage-5/" />
  <script>
    if (window.self === window.top && window.location.protocol !== 'file:' && !window.location.hostname.includes('localhost') && !window.location.hostname.includes('127.0.0.1')) {
      window.location.replace('/blog-demo/' + window.location.pathname.split('/').pop().replace('.html', '') + '/');
    }
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Build a Notes App using JavaScript and Local Storage | Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background-color: #f3f4f6;
      display: flex;
      justify-content: center;
      padding: 2rem;
      min-height: 100vh;
    }

    .app-container {
      width: 100%;
      max-width: 900px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 2rem;
      color: #111827;
    }

    .add-btn {
      background: #04AA6D;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 6px -1px rgba(4, 170, 109, 0.2);
      transition: all 0.2s ease;
    }

    .add-btn:hover {
      background: #038a58;
      transform: translateY(-2px);
    }

    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1.5rem;
    }

    .note {
      background: white;
      border-radius: 12px;
      padding: 1.2rem;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
      position: relative;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .note:hover {
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      transform: translateY(-5px);
    }

    .note textarea {
      width: 100%;
      border: none;
      resize: none;
      outline: none;
      background: transparent;
      color: #374151;
      font-size: 1rem;
      line-height: 1.5;
    }

    .note .note-title {
      font-weight: 600;
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
      color: #1f2937;
    }

    .note .note-body {
      flex-grow: 1;
      min-height: 120px;
    }

    .delete-btn {
      position: absolute;
      bottom: 15px;
      right: 15px;
      background: #ef4444;
      color: white;
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .note:hover .delete-btn {
      opacity: 1;
    }

    .delete-btn:hover {
      background: #dc2626;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="header">
      <h1>My Notes</h1>
      <button class="add-btn" id="add-note">+ Add Note</button>
    </div>
    <div class="notes-grid" id="notes-grid">
      <!-- Notes will be inserted here dynamically -->
    </div>
  </div>

  <script>
    const notesGrid = document.getElementById('notes-grid');
    const addNoteBtn = document.getElementById('add-note');

    // Load notes from local storage
    const getNotes = () => JSON.parse(localStorage.getItem('notes-app') || '[]');

    // Save notes to local storage
    const saveNotes = (notes) => localStorage.setItem('notes-app', JSON.stringify(notes));

    // Create a note element
    const createNoteElement = (id, title, body) => {
      const noteDiv = document.createElement('div');
      noteDiv.classList.add('note');
      
      const titleInput = document.createElement('textarea');
      titleInput.classList.add('note-title');
      titleInput.placeholder = 'Note Title';
      titleInput.value = title;
      titleInput.rows = 1;
      
      const bodyInput = document.createElement('textarea');
      bodyInput.classList.add('note-body');
      bodyInput.placeholder = 'Type your note here...';
      bodyInput.value = body;

      const deleteBtn = document.createElement('button');
      deleteBtn.classList.add('delete-btn');
      deleteBtn.innerHTML = '🗑️';
      
      // Event listeners for updating note
      const updateNote = () => {
        const notes = getNotes();
        const note = notes.find(n => n.id === id);
        if (note) {
          note.title = titleInput.value;
          note.body = bodyInput.value;
          saveNotes(notes);
        }
      };

      titleInput.addEventListener('input', updateNote);
      bodyInput.addEventListener('input', updateNote);

      deleteBtn.addEventListener('click', () => {
        const confirmDelete = confirm('Are you sure you want to delete this note?');
        if (confirmDelete) {
          const notes = getNotes().filter(n => n.id !== id);
          saveNotes(notes);
          notesGrid.removeChild(noteDiv);
        }
      });

      noteDiv.appendChild(titleInput);
      noteDiv.appendChild(bodyInput);
      noteDiv.appendChild(deleteBtn);
      
      return noteDiv;
    };

    // Render all notes
    const renderNotes = () => {
      notesGrid.innerHTML = '';
      const notes = getNotes();
      notes.forEach(note => {
        const noteEl = createNoteElement(note.id, note.title, note.body);
        notesGrid.appendChild(noteEl);
      });
    };

    // Add new note
    addNoteBtn.addEventListener('click', () => {
      const notes = getNotes();
      const newNote = {
        id: Date.now().toString(),
        title: '',
        body: ''
      };
      notes.unshift(newNote); // Add to the top
      saveNotes(notes);
      
      // Render the new note at the beginning
      const noteEl = createNoteElement(newNote.id, newNote.title, newNote.body);
      notesGrid.prepend(noteEl);
    });

    // Initial render
    renderNotes();
  </script>
</body>
</html>
