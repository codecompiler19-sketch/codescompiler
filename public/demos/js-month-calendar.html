<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JS Month Calendar</title>
  <style>
    body { background: #fafafa; display: flex; justify-content: center; padding: 40px; font-family: sans-serif; }
    .cal { width: 100%; max-width: 400px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);}
    .header { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; font-weight: bold; font-size: 1.2rem;}
    button { padding: 5px 15px; cursor: pointer; border: 1px solid #ccc; background: white; border-radius: 4px;}
    .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center;}
    .header-day { font-weight: bold; color: #888; padding-bottom: 10px;}
    .day { padding: 10px; background: #f9f9f9; border-radius: 4px; color: #333;}
    .empty { background: transparent; }
  </style>
</head>
<body>
  <div class="cal">
    <div class="header">
      <button onclick="prevMonth()">Prev</button>
      <div id="monthLabel"></div>
      <button onclick="nextMonth()">Next</button>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <script>
    const labels = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    
    let currentDate = new Date();
    
    function render() {
      const y = currentDate.getFullYear();
      const m = currentDate.getMonth();
      document.getElementById('monthLabel').innerText = `${months[m]} ${y}`;
      
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      labels.forEach(l => grid.innerHTML += `<div class="header-day">${l}</div>`);
      
      const firstDay = new Date(y, m, 1).getDay();
      const daysInMonth = new Date(y, m + 1, 0).getDate();
      
      // Empty spaces
      for(let i=0; i<firstDay; i++) grid.innerHTML += `<div class="empty"></div>`;
      // Days
      for(let d=1; d<=daysInMonth; d++) {
        grid.innerHTML += `<div class="day">${d}</div>`;
      }
    }
    
    function prevMonth() { currentDate.setMonth(currentDate.getMonth() - 1); render(); }
    function nextMonth() { currentDate.setMonth(currentDate.getMonth() + 1); render(); }
    render();
  </script>
</body>
</html>
