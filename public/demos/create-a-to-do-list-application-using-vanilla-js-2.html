<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="canonical" href="https://codescompiler.com/blog/create-a-to-do-list-application-using-vanilla-js-2/" />
  <script>
    if (window.self === window.top && window.location.protocol !== 'file:' && !window.location.hostname.includes('localhost') && !window.location.hostname.includes('127.0.0.1')) {
      window.location.replace('/blog-demo/' + window.location.pathname.split('/').pop().replace('.html', '') + '/');
    }
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List App | Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
    
    body {
      background: #f8fafc;
      color: #334155;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
      min-height: 100vh;
    }

    .todo-app {
      background: white;
      width: 100%;
      max-width: 500px;
      border-radius: 16px;
      box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1);
      padding: 30px;
      height: fit-content;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 20px;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-section {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 20px;
      border-radius: 30px;
      border: 1px solid #e2e8f0;
      background: #f1f5f9;
      font-size: 1rem;
      outline: none;
      transition: all 0.2s;
    }

    input[type="text"]:focus {
      border-color: #3b82f6;
      background: white;
    }

    .add-btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 0 25px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .add-btn:hover { background: #2563eb; }

    ul { list-style: none; }

    li {
      display: flex;
      align-items: center;
      padding: 15px;
      background: #f8fafc;
      border-radius: 10px;
      margin-bottom: 10px;
      transition: all 0.3s ease;
    }

    li.completed { opacity: 0.6; }
    
    li.completed .task-text {
      text-decoration: line-through;
      color: #94a3b8;
    }

    .checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid #cbd5e1;
      border-radius: 50%;
      margin-right: 15px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.2s;
    }

    li.completed .checkbox {
      background: #10b981;
      border-color: #10b981;
    }

    li.completed .checkbox::after {
      content: '✓';
      color: white;
      font-size: 12px;
    }

    .task-text {
      flex: 1;
      font-size: 1.05rem;
      transition: all 0.2s;
      word-break: break-all;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ef4444;
      font-size: 1.2rem;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.2s;
      padding: 5px;
    }

    .delete-btn:hover { opacity: 1; }

    .empty-state {
      text-align: center;
      color: #94a3b8;
      padding: 20px;
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="todo-app">
    <h1>📝 To-Do List</h1>
    
    <div class="input-section">
      <input type="text" id="taskInput" placeholder="Add a new task...">
      <button class="add-btn" id="addBtn">Add</button>
    </div>

    <ul id="taskList">
      <!-- Tasks will be added here -->
    </ul>
  </div>

  <script>
    const taskInput = document.getElementById('taskInput');
    const addBtn = document.getElementById('addBtn');
    const taskList = document.getElementById('taskList');

    // Load from LocalStorage
    let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

    function saveTasks() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function renderTasks() {
      taskList.innerHTML = '';
      
      if (tasks.length === 0) {
        taskList.innerHTML = '<div class="empty-state">No tasks yet. Add one above!</div>';
        return;
      }

      tasks.forEach((task, index) => {
        const li = document.createElement('li');
        if (task.completed) li.classList.add('completed');

        li.innerHTML = `
          <div class="checkbox" onclick="toggleTask(${index})"></div>
          <span class="task-text">${task.text}</span>
          <button class="delete-btn" onclick="deleteTask(${index})">×</button>
        `;
        taskList.appendChild(li);
      });
    }

    function addTask() {
      const text = taskInput.value.trim();
      if (text === '') return;

      tasks.push({ text: text, completed: false });
      taskInput.value = '';
      
      saveTasks();
      renderTasks();
    }

    function toggleTask(index) {
      tasks[index].completed = !tasks[index].completed;
      saveTasks();
      renderTasks();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      saveTasks();
      renderTasks();
    }

    // Event Listeners
    addBtn.addEventListener('click', addTask);
    
    taskInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addTask();
    });

    // Initial render
    renderTasks();
  </script>
</body>
</html>
