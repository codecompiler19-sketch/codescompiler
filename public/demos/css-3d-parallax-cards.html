<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Parallax - Demo</title>
  <style>
    body { background: #1e1e2f; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; margin: 0; perspective: 1000px; }
    .card-container { width: 350px; height: 500px; }
    .card { width: 100%; height: 100%; border-radius: 20px; background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 99%, #FECFEF 100%); transform-style: preserve-3d; transition: transform 0.1s ease; position: relative; box-shadow: 0 30px 60px rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center;}
    .content { transform: translateZ(80px); text-align: center; color: #333; pointer-events: none;}
    h1 { font-size: 3rem; margin: 0; text-transform: uppercase; letter-spacing: 2px;}
    p { font-size: 1.2rem; margin-top: 10px;}
    .glow { position: absolute; width: 100%; height: 100%; top: 0; left: 0; background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.4), transparent 60%); pointer-events: none; opacity: 0; transition: opacity 0.3s; border-radius: 20px; transform: translateZ(20px);}
  </style>
</head>
<body>
  <div class="card-container">
    <div class="card" id="card">
      <div class="glow" id="glow"></div>
      <div class="content">
        <h1>Hover!</h1>
        <p>3D Parallax Effect</p>
      </div>
    </div>
  </div>

  <script>
    const card = document.getElementById('card');
    const glow = document.getElementById('glow');
    
    card.addEventListener('mousemove', e => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left; 
      const y = e.clientY - rect.top;
      
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      
      const rotateX = ((y - centerY) / centerY) * -15; 
      const rotateY = ((x - centerX) / centerX) * 15;
      
      card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
      
      glow.style.opacity = 1;
      glow.style.background = `radial-gradient(circle at ${x}px ${y}px, rgba(255,255,255,0.4), transparent 50%)`;
    });

    card.addEventListener('mouseleave', () => {
      card.style.transform = `rotateX(0deg) rotateY(0deg)`;
      card.style.transition = `transform 0.5s ease`;
      glow.style.opacity = 0;
      setTimeout(() => card.style.transition = 'transform 0.1s ease', 500);
    });
  </script>
</body>
</html>
