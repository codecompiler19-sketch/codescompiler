<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Eternal Flame Demo</title>
  <style>
    body { background: #020617; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif;}
    
    .flame-box {
      width: 300px;
      height: 200px;
      background: #0f172a;
      border: 3px solid #f97316;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fed7aa;
      font-size: 1.5rem;
      font-weight: bold;
      letter-spacing: 2px;
      
      /* The magic fire */
      animation: inferno 0.15s infinite alternate;
      /* Using inset + standard spread to burn inside and outside */
    }
    
    @keyframes inferno {
      0% { 
        box-shadow: 
          0 -2px 15px #f97316, 
          2px -8px 25px #ef4444, 
          -2px -15px 35px #991b1b,
          inset 0 -5px 15px #ea580c;
        border-color: #f97316;
      }
      50% { 
        box-shadow: 
          3px -5px 20px #fb923c, 
          -3px -12px 30px #dc2626, 
          2px -20px 45px #7f1d1d,
          inset 0 -7px 20px #f97316;
        border-color: #fb923c;
      }
      100% { 
        box-shadow: 
          -3px -8px 22px #f97316, 
          3px -15px 35px #ef4444, 
          -1px -25px 50px #991b1b,
          inset 0 -3px 12px #ea580c;
        border-color: #ea580c;
      }
    }
  </style>
</head>
<body>
  <div class="flame-box">
    BURNING UI
  </div>
</body>
</html>
