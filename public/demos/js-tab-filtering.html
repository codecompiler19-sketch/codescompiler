<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JS Tab Filtering</title>
  <style>
    body { background: #fdfdfd; font-family: sans-serif; padding: 40px; display: flex; flex-direction: column; align-items: center;}
    .nav { display: flex; gap: 10px; margin-bottom: 30px;}
    button { padding: 10px 25px; border-radius: 30px; border: 2px solid #333; background: transparent; cursor: pointer; font-weight: bold; transition: 0.3s;}
    button.active { background: #333; color: white; }
    button:hover { background: #eee; }
    button.active:hover { background: #333; }
    
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 800px; width: 100%;}
    .item { background: #f4f4f5; border-radius: 12px; height: 150px; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; color: white; animation: pop 0.4s ease;}
    @keyframes pop { from {transform: scale(0.8); opacity:0;} to {transform: scale(1); opacity:1;} }
    
    .design { background: #38bdf8; }
    .code { background: #f43f5e; }
    .photo { background: #10b981; }
  </style>
</head>
<body>
  <h1>Portfolio</h1>
  <div class="nav">
    <button class="active" data-filter="all">All</button>
    <button data-filter="design">Web Design</button>
    <button data-filter="code">Coding</button>
    <button data-filter="photo">Photography</button>
  </div>
  
  <div class="grid">
    <div class="item design">Design 1</div>
    <div class="item code">Code App</div>
    <div class="item photo">Nature Photo</div>
    <div class="item design">Design 2</div>
    <div class="item photo">City Photo</div>
    <div class="item code">Code Script</div>
  </div>
  
  <script>
    const btns = document.querySelectorAll('button');
    const items = document.querySelectorAll('.item');
    
    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        btns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const filter = btn.dataset.filter;
        items.forEach(item => {
          if(filter === 'all' || item.classList.contains(filter)) {
            item.style.display = 'flex';
          } else {
            item.style.display = 'none';
          }
        });
      });
    });
  </script>
</body>
</html>
