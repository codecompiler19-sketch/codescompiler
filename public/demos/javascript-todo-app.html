<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App — Demo</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#f3f4f6;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:32px 16px;}
    .app{width:100%;max-width:520px;}
    h1{font-size:26px;font-weight:900;color:#111827;margin-bottom:4px;display:flex;align-items:center;gap:10px;}
    .subtitle{font-size:13px;color:#9ca3af;margin-bottom:20px;}
    /* Progress */
    .progress-wrap{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px 18px;margin-bottom:16px;}
    .progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:13px;color:#6b7280;}
    .bar-bg{height:8px;background:#f3f4f6;border-radius:10px;overflow:hidden;}
    .bar-fill{height:100%;background:linear-gradient(90deg,#04AA6D,#34d399);border-radius:10px;transition:width .4s;}
    /* Add input */
    .add-row{display:flex;gap:8px;margin-bottom:16px;}
    .add-input{flex:1;padding:13px 16px;border:2px solid #e5e7eb;border-radius:10px;font-size:15px;outline:none;font-family:inherit;transition:border-color .2s;}
    .add-input:focus{border-color:#04AA6D;}
    .add-btn{padding:13px 20px;background:#04AA6D;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;transition:background .2s;}
    .add-btn:hover{background:#038a58;}
    /* Filters */
    .filters{display:flex;gap:6px;margin-bottom:14px;}
    .filter-btn{flex:1;padding:8px;border:1px solid #e5e7eb;background:#fff;border-radius:8px;font-size:13px;font-weight:600;color:#6b7280;cursor:pointer;font-family:inherit;transition:all .15s;}
    .filter-btn.active{background:#04AA6D;border-color:#04AA6D;color:#fff;}
    /* Task list */
    .task-list{list-style:none;display:flex;flex-direction:column;gap:8px;min-height:80px;}
    .task-item{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:13px 14px;transition:opacity .2s,box-shadow .2s,transform .2s;animation:slideIn .2s ease;}
    .task-item:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-1px);}
    .task-item.done{opacity:.6;}
    @keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
    .check-btn{width:26px;height:26px;border-radius:50%;border:2px solid #d1d5db;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .2s;}
    .task-item.done .check-btn{background:#04AA6D;border-color:#04AA6D;color:#fff;}
    .check-btn:hover{border-color:#04AA6D;}
    .task-text{flex:1;font-size:14px;color:#374151;}
    .task-item.done .task-text{text-decoration:line-through;color:#9ca3af;}
    .del-btn{background:none;border:none;cursor:pointer;font-size:16px;padding:4px;border-radius:6px;opacity:0;transition:opacity .2s,background .15s;}
    .task-item:hover .del-btn{opacity:1;}
    .del-btn:hover{background:#fef2f2;}
    .empty{text-align:center;padding:32px;color:#9ca3af;font-size:14px;}
    .clear-all{border:none;background:none;cursor:pointer;font-size:12px;color:#ef4444;font-family:inherit;margin-left:auto;padding:4px 8px;border-radius:6px;font-weight:600;}
    .clear-all:hover{background:#fef2f2;}
    .bottom-row{display:flex;align-items:center;margin-top:10px;}
    .count{font-size:12px;color:#9ca3af;}
  </style>
</head>
<body>
  <div class="app">
    <h1>📝 Todo List</h1>
    <p class="subtitle">Your tasks, always saved locally.</p>

    <div class="progress-wrap">
      <div class="progress-top">
        <span id="taskCount">0 tasks remaining</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
    </div>

    <div class="add-row">
      <input class="add-input" id="taskInput" placeholder="What needs to be done?" />
      <button class="add-btn" id="addBtn">+ Add</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Done</button>
    </div>

    <ul class="task-list" id="taskList"></ul>

    <div class="bottom-row">
      <span class="count" id="bottomCount"></span>
      <button class="clear-all" id="clearDone" style="display:none">Clear completed</button>
    </div>
  </div>

  <script>
    const STORE='cc-todos-demo';
    let tasks=JSON.parse(localStorage.getItem(STORE)||'[]');
    let filter='all';
    const save=()=>localStorage.setItem(STORE,JSON.stringify(tasks));
    const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    function add(txt){if(!txt.trim())return;tasks.unshift({id:Date.now(),text:txt.trim(),done:false});save();render();}
    function toggle(id){const t=tasks.find(t=>t.id===id);if(t){t.done=!t.done;save();render();}}
    function del(id){tasks=tasks.filter(t=>t.id!==id);save();render();}

    function render(){
      const filtered=tasks.filter(t=>filter==='active'?!t.done:filter==='completed'?t.done:true);
      const done=tasks.filter(t=>t.done).length;
      const pct=tasks.length?Math.round(done/tasks.length*100):0;
      const remaining=tasks.filter(t=>!t.done).length;
      document.getElementById('taskCount').textContent=`${remaining} task${remaining!==1?'s':''} remaining`;
      document.getElementById('progressPct').textContent=pct+'%';
      document.getElementById('barFill').style.width=pct+'%';
      document.getElementById('bottomCount').textContent=`${tasks.length} total task${tasks.length!==1?'s':''}`;
      document.getElementById('clearDone').style.display=done>0?'':'none';

      const list=document.getElementById('taskList');
      list.innerHTML=filtered.length===0
        ?`<li class="empty">${filter==='completed'?'No completed tasks yet!':'No tasks! Add one above ☝️'}</li>`
        :filtered.map(t=>`
          <li class="task-item${t.done?' done':''}" id="ti-${t.id}">
            <button class="check-btn" onclick="toggle(${t.id})">${t.done?'✓':''}</button>
            <span class="task-text">${esc(t.text)}</span>
            <button class="del-btn" onclick="del(${t.id})" title="Delete">🗑</button>
          </li>`).join('');
    }

    // If empty, add starter tasks
    if(!tasks.length){
      ['Learn CSS Grid and Flexbox','Build a portfolio website','Try the Live Demo button','Add your own tasks!'].forEach(t=>tasks.push({id:Date.now()+Math.random(),text:t,done:false}));
      tasks[2].done=true;save();
    }

    document.getElementById('addBtn').addEventListener('click',()=>{const i=document.getElementById('taskInput');add(i.value);i.value='';i.focus();});
    document.getElementById('taskInput').addEventListener('keydown',e=>{if(e.key==='Enter'){const i=e.target;add(i.value);i.value='';}});
    document.getElementById('clearDone').addEventListener('click',()=>{tasks=tasks.filter(t=>!t.done);save();render();});
    document.querySelectorAll('.filter-btn').forEach(b=>{
      b.addEventListener('click',()=>{filter=b.dataset.filter;document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');render();});
    });
    render();
  </script>
</body>
</html>
