<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="canonical" href="https://codescompiler.com/blog/build-a-touch-friendly-image-swiper-in-javascript-5/" />
  <script>
    if (window.self === window.top) {
      window.location.replace('/blog-demo/' + window.location.pathname.split('/').pop().replace('.html', '') + '/');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Touch Friendly Swiper</title>
    <style>
        body { margin: 0; padding: 0; }
        .swiper-wrapper-main {
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          min-height: 100vh;
          background-color: #2b2d42;
          color: white;
          font-family: 'Inter', sans-serif;
          overflow: hidden;
        }
        .swiper-wrapper-main h2 { margin-bottom: 30px; font-weight: 300; letter-spacing: 2px; }
        .swiper-container {
          width: 100%;
          max-width: 900px;
          overflow: hidden;
          cursor: grab;
          padding: 20px 0;
        }
        .swiper-container:active { cursor: grabbing; }
        .swiper-track {
          display: flex;
          gap: 20px;
          transition: transform 0.3s ease-out;
          padding: 0 20px;
        }
        .swiper-slide {
          min-width: 300px;
          height: 400px;
          border-radius: 20px;
          overflow: hidden;
          box-shadow: 0 10px 20px rgba(0,0,0,0.3);
          user-select: none;
          pointer-events: none;
        }
        .swiper-slide img {
          width: 100%; height: 100%;
          object-fit: cover;
          pointer-events: none;
        }
        @media(max-width: 768px) {
          .swiper-slide { min-width: 250px; height: 350px; }
        }
    </style>
</head>
<body>
    <div class="swiper-wrapper-main">
      <h2>Drag or Swipe to Explore</h2>
      <div class="swiper-container" id="touch-swiper">
        <div class="swiper-track">
          <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&w=600&q=80" alt="Img 1"></div>
          <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=600&q=80" alt="Img 2"></div>
          <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1494522855154-9297ac14b55f?auto=format&fit=crop&w=600&q=80" alt="Img 3"></div>
          <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1448375240586-882707db888b?auto=format&fit=crop&w=600&q=80" alt="Img 4"></div>
          <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=600&q=80" alt="Img 5"></div>
        </div>
      </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const track = document.querySelector('.swiper-track');
            const container = document.getElementById('touch-swiper');
            if(!track || !container) return;

            let isDragging = false;
            let startPos = 0;
            let currentTranslate = 0;
            let prevTranslate = 0;
            let animationID = 0;

            container.addEventListener('mousedown', touchStart);
            container.addEventListener('mouseup', touchEnd);
            container.addEventListener('mouseleave', touchEnd);
            container.addEventListener('mousemove', touchMove);

            container.addEventListener('touchstart', touchStart);
            container.addEventListener('touchend', touchEnd);
            container.addEventListener('touchmove', touchMove);

            function touchStart(e) {
                isDragging = true;
                startPos = getPositionX(e);
                animationID = requestAnimationFrame(animation);
                track.style.transition = 'none';
            }

            function touchMove(e) {
                if (isDragging) {
                    const currentPosition = getPositionX(e);
                    currentTranslate = prevTranslate + currentPosition - startPos;
                }
            }

            function touchEnd() {
                isDragging = false;
                cancelAnimationFrame(animationID);
                track.style.transition = 'transform 0.3s ease-out';
                
                const trackWidth = track.scrollWidth;
                const containerWidth = container.clientWidth;
                const minTranslate = -(trackWidth - containerWidth + 40);

                if (currentTranslate > 0) currentTranslate = 0;
                if (currentTranslate < minTranslate) currentTranslate = minTranslate;

                prevTranslate = currentTranslate;
                setSliderPosition();
            }

            function getPositionX(event) {
                return event.type.includes('mouse') ? event.pageX : event.touches[0].clientX;
            }

            function animation() {
                setSliderPosition();
                if (isDragging) requestAnimationFrame(animation);
            }

            function setSliderPosition() {
                track.style.transform = `translateX(${currentTranslate}px)`;
            }
        });
    </script>
</body>
</html>
