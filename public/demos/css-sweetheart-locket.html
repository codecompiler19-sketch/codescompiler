<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sweetheart Locket Demo</title>
  <style>
    body { background: #fffcfdbf; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; perspective: 1000px;}
    .locket { width: 200px; height: 200px; position: relative; cursor: pointer; transform-style: preserve-3d; }
    
    .half { position: absolute; width: 100%; height: 100%; top: 0; background: #f43f5e; box-shadow: 0 10px 30px rgba(244,63,94,0.4); clip-path: polygon(50% 15%, 61% 0, 85% 0, 100% 25%, 100% 50%, 50% 100%, 0 50%, 0 25%, 15% 0, 39% 0); transform-origin: left;}
    
    .cover { z-index: 3; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid white; display: flex; justify-content: center; align-items: center; font-size: 3rem; color: #ffe4e6;}
    .locket:hover .cover { transform: rotateY(-180deg); }
    
    .inside { z-index: 1; background: white; border: 4px solid #f43f5e; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;}
    .inside img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #f43f5e; margin-top: 15px;}
    .inside h3 { margin: 5px 0 0; font-size: 1.1rem; color: #1f2937;}
    .inside p { margin: 0; font-size: 0.8rem; color: #6b7280; margin-bottom: 25px;}
  </style>
</head>
<body>
  <p style="position: absolute; top: 40px; color: #9ca3af;">Hover over the locket</p>
  <div class="locket">
    <div class="half inside">
      <img src="https://source.unsplash.com/random/100x100/?portrait" alt="Profile">
      <h3>Alex Doe</h3>
      <p>Dreamer & Dev</p>
    </div>
    <div class="half cover">♡</div>
  </div>
</body>
</html>
