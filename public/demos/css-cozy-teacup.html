<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cozy Teacup Demo</title>
  <style>
    body { background: #faf5f0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: serif; color: #4338ca; transition: 1s;}
    .moods { margin-bottom: 50px; display: flex; gap: 15px;}
    button { padding: 10px 20px; font-size: 1.1rem; border-radius: 20px; border: 1px solid #cbd5e1; background: white; cursor: pointer; font-family: serif; transition: 0.3s;}
    .tea-container { position: relative; width: 250px; height: 150px; display: flex; justify-content: center; cursor: pointer;}
    .cup { width: 160px; height: 120px; background: white; border-radius: 10px 10px 60px 60px; position: absolute; bottom: 0; border: 4px solid #333; z-index: 2; transition: 0.4s;}
    .cup::before { content:''; position: absolute; right: -40px; top: 20px; width: 40px; height: 50px; border: 4px solid #333; border-radius: 30px; border-left: none;}
    .tea-container:hover .cup { transform: rotate(5deg); }
    .steam-area { width: 100px; height: 150px; position: absolute; bottom: 100px; overflow: hidden; z-index: 1;}
    .steam { width: 20px; height: 20px; background: #94a3b8; border-radius: 50%; filter: blur(6px); position: absolute; bottom: -20px; animation: rise 5s linear infinite; opacity: 0;}
    @keyframes rise { 0% { transform: translateY(0) scale(1); opacity: 0.5;} 100% { transform: translateY(-150px) scale(4); opacity: 0;} }
    .quote { font-size: 1.5rem; height: 40px; margin-top: 40px; font-style: italic; opacity: 0; transition: 1s;}
  </style>
</head>
<body>
  <div class="moods">
    <button onclick="setMood('#e0f2fe', '#38bdf8')">Calm</button>
    <button onclick="setMood('#fce7f3', '#f472b6')">Joy</button>
    <button onclick="setMood('#dcfce7', '#4ade80')">Refresh</button>
  </div>
  <div class="tea-container" onclick="sip()">
    <div class="steam-area" id="stArea"></div>
    <div class="cup"></div>
  </div>
  <div class="quote" id="q">"Breathe in, breathe out."</div>
  
  <script>
    let cColor = '#94a3b8';
    function spawnSteam() {
      const s = document.createElement('div');
      s.className = 'steam'; s.style.background = cColor;
      s.style.left = (Math.random() * 80) + 'px';
      s.style.animationDuration = (Math.random() * 3 + 3) + 's';
      document.getElementById('stArea').appendChild(s);
      setTimeout(()=>s.remove(), 6000);
    }
    setInterval(spawnSteam, 800);
    function setMood(bg, st) { document.body.style.background = bg; cColor = st; }
    function sip() {
      const msgs = ["Take it one step at a time.", "You are doing great.", "Feel the warmth.", "Embrace the quiet."];
      const q = document.getElementById('q');
      q.style.opacity = 0;
      setTimeout(()=> { q.innerText = msgs[Math.floor(Math.random()*msgs.length)]; q.style.opacity = 1; }, 500);
    }
    setTimeout(()=> document.getElementById('q').style.opacity = 1, 1000);
  </script>
</body>
</html>
