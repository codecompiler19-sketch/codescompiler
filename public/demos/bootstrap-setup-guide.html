<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap Alert Setup</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style> body { padding: 40px; background: #f8f9fa; } </style>
</head>
<body>
  <div class="container">
    <h1 class="mb-4">Bootstrap 5 Alerts</h1>
    
    <div class="alert alert-primary" role="alert">
      A simple primary alert—check it out!
    </div>
    <div class="alert alert-success" role="alert">
      A simple success alert—perfect for saving forms!
    </div>
    <div class="alert alert-danger" role="alert">
      A simple danger alert—use this for error messages.
    </div>
    
    <hr class="my-5">
    <h2>Interactive Buttons</h2>
    
    <div id="liveAlertPlaceholder"></div>
    
    <button type="button" class="btn btn-primary" id="liveAlertBtn">Show Primary Alert</button>
    <button type="button" class="btn btn-outline-success" id="successBtn">Outline Success</button>
    <button type="button" class="btn btn-danger btn-lg" id="dangerBtn">Large Danger</button>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const alertPlaceholder = document.getElementById('liveAlertPlaceholder');

    const appendAlert = (message, type) => {
      const wrapper = document.createElement('div')
      wrapper.innerHTML = [
        `<div class="alert alert-${type} alert-dismissible fade show" role="alert">`,
        `   <div>${message}</div>`,
        `   <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>`,
        '</div>'
      ].join('')
      alertPlaceholder.append(wrapper);
    }

    const alertTrigger = document.getElementById('liveAlertBtn')
    if (alertTrigger) {
      alertTrigger.addEventListener('click', () => { appendAlert('Nice, you triggered a primary alert message!', 'primary') })
    }
    document.getElementById('successBtn').addEventListener('click', () => { appendAlert('Your action was successfully saved!', 'success') })
    document.getElementById('dangerBtn').addEventListener('click', () => { appendAlert('Error! Something went wrong.', 'danger') })
  </script>
</body>
</html>
