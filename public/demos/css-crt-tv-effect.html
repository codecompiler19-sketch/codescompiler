<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CRT Effect Demo</title>
  <style>
    body { background: #121010; color: #3f3; font-family: monospace; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; font-size: 2rem;}
    .crt-container { position: relative; width: 80%; height: 80%; background: #000; border: 20px solid #222; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.8); overflow: hidden; display: flex; flex-direction: column; justify-content: center; padding: 40px;}
    
    .crt::before {
      content: ""; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 2; background-size: 100% 3px, 6px 100%; pointer-events: none;
    }
    @keyframes flicker { 0% { opacity: 0.95; } 5% { opacity: 0.85; } 10% { opacity: 0.95; } 15% { opacity: 1; } }
    .crt { animation: flicker 0.15s infinite; }
    h1 { margin: 0 0 20px; font-weight: normal; text-shadow: 0 0 10px rgba(51, 255, 51, 0.5); }
    .cursor { animation: blink 1s infinite; display: inline-block; width: 20px; height: 30px; background: #3f3; vertical-align: middle; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <div class="crt-container crt">
    <h1>> SYSTEM BOOT_</h1>
    <p>> LOADING ASSETS... OK<br>> MEMORY TEST... OK<br>> READY_<span class="cursor"></span></p>
  </div>
</body>
</html>
