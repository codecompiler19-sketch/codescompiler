<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sidebar Menu - Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #f3f4f6; }
    .sidebar { position: fixed; left: 0; top: 0; height: 100%; width: 260px; background: #111827; padding: 20px 14px; transition: all 0.3s ease; }
    .logo-details { display: flex; align-items: center; color: #fff; font-size: 20px; font-weight: 700; margin-bottom: 30px; padding-left: 10px; }
    .logo-details i { margin-right: 10px; font-style: normal; }
    .nav-links { list-style: none; }
    .nav-links li { margin-bottom: 8px; }
    .nav-links li a { display: flex; align-items: center; color: #94a3b8; font-size: 15px; font-weight: 500; padding: 12px 14px; border-radius: 10px; text-decoration: none; transition: 0.3s; }
    .nav-links li a:hover, .nav-links li a.active { color: #fff; background: #3b82f6; }
    .nav-links li a i { font-size: 18px; margin-right: 14px; font-style: normal; }
    .home-section { position: relative; background: #f3f4f6; min-height: 100vh; left: 260px; width: calc(100% - 260px); padding: 30px; }
    h1 { color: #1f2937; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo-details">
      <i>💻</i><span class="logo_name">AdminUI</span>
    </div>
    <ul class="nav-links">
      <li><a href="#" class="active"><i>📊</i><span class="link_name">Dashboard</span></a></li>
      <li><a href="#"><i>👥</i><span class="link_name">Users</span></a></li>
      <li><a href="#"><i>⚙️</i><span class="link_name">Settings</span></a></li>
    </ul>
  </div>
  <section class="home-section">
    <h1>Dashboard Content</h1>
    <p style="margin-top:20px;color:#6b7280;">Notice how the sidebar is fixed and provides easy navigation.</p>
  </section>
</body>
</html>
