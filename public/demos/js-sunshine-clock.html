<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sunshine Clock Demo</title>
  <style>
    body { background: #7dd3fc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Comic Sans MS', cursive, sans-serif; transition: background 2s;}
    
    .sun { width: 300px; height: 300px; position: relative; display: flex; justify-content: center; align-items: center; }
    
    .rays { position: absolute; width: 100%; height: 100%; animation: spin 20s linear infinite; }
    .ray { position: absolute; width: 20px; height: 100%; background: #fde047; left: 50%; margin-left: -10px; border-radius: 10px;}
    .ray:nth-child(2) { transform: rotate(45deg); }
    .ray:nth-child(3) { transform: rotate(90deg); }
    .ray:nth-child(4) { transform: rotate(135deg); }
    
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    .clock-face { width: 220px; height: 220px; background: white; border-radius: 50%; z-index: 2; box-shadow: 0 0 30px rgba(253, 224, 71, 0.8); display: flex; justify-content: center; align-items: center; font-size: 3rem; color: #fb923c; border: 8px solid #fef08a;}
  </style>
</head>
<body>
  <div class="sun">
    <div class="rays">
      <div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div>
    </div>
    <div class="clock-face" id="time">12:00</div>
  </div>

  <script>
    function update() {
      const d = new Date();
      let h = d.getHours();
      let m = d.getMinutes().toString().padStart(2, '0');
      
      // Auto theme based on hour
      document.body.style.background = (h > 18 || h < 6) ? '#1e1b4b' : (h > 16 ? '#fdba74' : '#7dd3fc');
      
      let ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      
      document.getElementById('time').innerText = `${h}:${m} ${ampm}`;
    }
    setInterval(update, 1000);
    update();
  </script>
</body>
</html>
