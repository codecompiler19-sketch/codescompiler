<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magnifying Glass Lens | Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
    
    body { background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }

    h2 { margin-bottom: 20px; color: #38bdf8; text-align: center; }
    p { margin-bottom: 40px; color: #94a3b8; text-align: center; max-width: 500px; }

    .image-container {
      position: relative;
      width: 100%;
      max-width: 600px;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      cursor: none; /* Hide default cursor */
    }

    .main-image {
      width: 100%;
      height: auto;
      border-radius: 12px;
      display: block;
    }

    .lens {
      position: absolute;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 3px solid white;
      box-shadow: 0 0 0 4px rgba(0,0,0,0.2), 0 10px 20px rgba(0,0,0,0.3);
      
      /* Magic happens here: The background image is identical to main image */
      background-image: url('https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=1200&q=80');
      background-repeat: no-repeat;
      
      /* Initially hidden */
      opacity: 0;
      pointer-events: none; /* So the mouse events pass through to container */
      transition: opacity 0.2s;
    }

    /* Show lens on hover */
    .image-container:hover .lens {
      opacity: 1;
    }

  </style>
</head>
<body>

  <h2>CSS Magnifying Glass Effect</h2>
  <p>Hover your mouse over the image below to inspect the details using a custom magnifying glass lens!</p>

  <div class="image-container" id="container">
    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=600&q=80" class="main-image" id="mainImage" alt="Sneaker">
    <div class="lens" id="lens"></div>
  </div>

  <script>
    const container = document.getElementById('container');
    const lens = document.getElementById('lens');
    const mainImage = document.getElementById('mainImage');

    // Zoom level (e.g., 2 means the lens background is 2x larger than the image)
    const zoomLevel = 2;

    container.addEventListener('mousemove', (e) => {
      // 1. Get the cursor position relative to the container
      const rect = container.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      // 2. Center the lens exactly on the cursor
      const lensRadius = lens.offsetWidth / 2;
      lens.style.left = `${x - lensRadius}px`;
      lens.style.top = `${y - lensRadius}px`;

      // 3. Set the size of the background image inside the lens based on zoom level
      const bgWidth = mainImage.width * zoomLevel;
      const bgHeight = mainImage.height * zoomLevel;
      lens.style.backgroundSize = `${bgWidth}px ${bgHeight}px`;

      // 4. Move the background image inside the lens in the opposite direction
      const bgPosX = (x * zoomLevel) - lensRadius;
      const bgPosY = (y * zoomLevel) - lensRadius;
      lens.style.backgroundPosition = `-${bgPosX}px -${bgPosY}px`;
    });
  </script>

</body>
</html>
