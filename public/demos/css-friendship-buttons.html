<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Friendship Buttons Demo</title>
  <style>
    body { background: #fdfbfb; display: flex; justify-content: center; align-items: center; height: 100vh; gap: 30px; margin: 0; font-family: 'Comic Sans MS', cursive, sans-serif;}
    
    .bead-btn { padding: 15px 40px; font-size: 1.5rem; font-weight: bold; color: white; border: none; border-radius: 40px; cursor: pointer; transition: 0.1s transform, 0.1s box-shadow; letter-spacing: 2px;}
    
    .kindness { background: #f472b6; box-shadow: inset 0 6px 0 rgba(255,255,255,0.4), 0 8px 0 #be185d, 0 12px 15px rgba(244,114,182,0.4);}
    .kindness:active { transform: translateY(8px); box-shadow: inset 0 2px 0 rgba(255,255,255,0.4), 0 0 0 #be185d; }
    
    .hug { background: #38bdf8; box-shadow: inset 0 6px 0 rgba(255,255,255,0.4), 0 8px 0 #0284c7, 0 12px 15px rgba(56,189,248,0.4);}
    .hug:active { transform: translateY(8px); box-shadow: inset 0 2px 0 rgba(255,255,255,0.4), 0 0 0 #0284c7; }
    
    .smile { background: #f43f5e; box-shadow: inset 0 6px 0 rgba(255,255,255,0.4), 0 8px 0 #9f1239, 0 12px 15px rgba(244,63,94,0.4);}
    .smile:active { transform: translateY(8px); box-shadow: inset 0 2px 0 rgba(255,255,255,0.4), 0 0 0 #9f1239; }
  </style>
</head>
<body>
  <button class="bead-btn kindness">KINDNESS</button>
  <button class="bead-btn hug">HUG</button>
  <button class="bead-btn smile">SMILE</button>
</body>
</html>
