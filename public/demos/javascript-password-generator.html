<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator — Demo</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a,#1e293b);font-family:'Segoe UI',sans-serif;padding:20px;}
    .app{background:#1e293b;border:1px solid rgba(255,255,255,0.07);border-radius:24px;padding:36px;width:100%;max-width:440px;box-shadow:0 24px 80px rgba(0,0,0,.5);}
    h1{font-size:22px;font-weight:900;color:#f1f5f9;margin-bottom:6px;}
    p.sub{font-size:13px;color:#64748b;margin-bottom:28px;}

    /* Output */
    .output-wrap{display:flex;gap:8px;margin-bottom:20px;}
    .output{
      flex:1;padding:14px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
      border-radius:12px;font-size:15px;color:#e2e8f0;font-family:'Courier New',monospace;
      outline:none;cursor:pointer;word-break:break-all;
    }
    .copy-btn{padding:14px 18px;background:#04AA6D;border:none;border-radius:12px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;transition:background .2s,transform .1s;font-family:inherit;}
    .copy-btn:hover{background:#038a58;transform:translateY(-1px);}
    .copy-btn:active{transform:translateY(0);}

    /* Strength */
    .strength-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
    .strength-row span{font-size:13px;font-weight:700;}
    .strength-label{font-size:12px;font-weight:800;}
    .strength-bg{height:6px;background:rgba(255,255,255,0.06);border-radius:10px;overflow:hidden;margin-bottom:24px;}
    .strength-fill{height:100%;border-radius:10px;transition:width .4s,background .4s;width:0%;}

    /* Length slider */
    .control-row{margin-bottom:16px;}
    .control-label{display:flex;justify-content:space-between;font-size:13px;color:#94a3b8;margin-bottom:8px;}
    .control-label strong{color:#f1f5f9;}
    input[type=range]{width:100%;accent-color:#04AA6D;cursor:pointer;}

    /* Checkboxes */
    .options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
    .opt{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:11px 14px;cursor:pointer;transition:border-color .2s;}
    .opt:hover{border-color:rgba(255,255,255,0.18);}
    .opt input{accent-color:#04AA6D;width:15px;height:15px;cursor:pointer;}
    .opt span{font-size:13px;color:#cbd5e1;font-weight:500;}

    .gen-btn{width:100%;padding:14px;background:linear-gradient(135deg,#04AA6D,#038a58);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;transition:opacity .2s,transform .15s;box-shadow:0 6px 24px rgba(4,170,109,0.3);}
    .gen-btn:hover{opacity:.9;transform:translateY(-2px);}

    /* Toast */
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:#04AA6D;color:#fff;padding:10px 22px;border-radius:30px;font-weight:700;font-size:13px;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
    .toast.show{transform:translateX(-50%) translateY(0);}
  </style>
</head>
<body>
  <div class="app">
    <h1>🔐 Password Generator</h1>
    <p class="sub">Generate secure, random passwords instantly.</p>

    <div class="output-wrap">
      <input type="text" class="output" id="output" readonly onclick="this.select()"/>
      <button class="copy-btn" id="copyBtn">📋 Copy</button>
    </div>

    <div class="strength-row">
      <span style="font-size:13px;color:#64748b">Strength</span>
      <span class="strength-label" id="strengthLabel">—</span>
    </div>
    <div class="strength-bg"><div class="strength-fill" id="strengthFill"></div></div>

    <div class="control-row">
      <div class="control-label">
        <span>Password Length</span>
        <strong id="lenDisplay">16</strong>
      </div>
      <input type="range" id="lengthSlider" min="6" max="32" value="16"/>
    </div>

    <div class="options">
      <label class="opt"><input type="checkbox" id="optUpper" checked><span>Uppercase (A–Z)</span></label>
      <label class="opt"><input type="checkbox" id="optLower" checked><span>Lowercase (a–z)</span></label>
      <label class="opt"><input type="checkbox" id="optNumbers" checked><span>Numbers (0–9)</span></label>
      <label class="opt"><input type="checkbox" id="optSymbols" checked><span>Symbols (!@#)</span></label>
    </div>

    <button class="gen-btn" id="genBtn">⚡ Generate Password</button>
  </div>
  <div class="toast" id="toast">✅ Copied to clipboard!</div>

  <script>
    const CHARS={lower:'abcdefghijklmnopqrstuvwxyz',upper:'ABCDEFGHIJKLMNOPQRSTUVWXYZ',numbers:'0123456789',symbols:'!@#$%^&*()_+-=[]{}|;:,.<>?'};

    function generate(){
      const len=+document.getElementById('lengthSlider').value;
      let pool=CHARS.lower;
      if(document.getElementById('optUpper').checked)pool+=CHARS.upper;
      if(document.getElementById('optNumbers').checked)pool+=CHARS.numbers;
      if(document.getElementById('optSymbols').checked)pool+=CHARS.symbols;
      if(!pool)pool=CHARS.lower;
      const arr=new Uint32Array(len);
      crypto.getRandomValues(arr);
      const pw=Array.from(arr,n=>pool[n%pool.length]).join('');
      document.getElementById('output').value=pw;
      updateStrength(pw);
    }

    function updateStrength(pw){
      let s=0;
      if(pw.length>=8)s++;if(pw.length>=12)s++;if(pw.length>=16)s++;
      if(/[A-Z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;
      const levels=[
        {label:'Very Weak',color:'#ef4444',w:'15%'},
        {label:'Weak',color:'#f97316',w:'30%'},
        {label:'Fair',color:'#f59e0b',w:'50%'},
        {label:'Good',color:'#3b82f6',w:'70%'},
        {label:'Strong',color:'#04AA6D',w:'85%'},
        {label:'Very Strong',color:'#22c55e',w:'100%'},
      ];
      const l=levels[Math.min(s,5)];
      document.getElementById('strengthFill').style.width=l.w;
      document.getElementById('strengthFill').style.background=l.color;
      document.getElementById('strengthLabel').textContent=l.label;
      document.getElementById('strengthLabel').style.color=l.color;
    }

    document.getElementById('genBtn').addEventListener('click',generate);
    document.getElementById('lengthSlider').addEventListener('input',()=>{document.getElementById('lenDisplay').textContent=document.getElementById('lengthSlider').value;generate();});
    document.querySelectorAll('.options input').forEach(i=>i.addEventListener('change',generate));

    document.getElementById('copyBtn').addEventListener('click',async()=>{
      const pw=document.getElementById('output').value;if(!pw)return;
      try{await navigator.clipboard.writeText(pw);}catch{document.getElementById('output').select();document.execCommand('copy');}
      const btn=document.getElementById('copyBtn');const t=document.getElementById('toast');
      btn.textContent='✅ Copied!';t.classList.add('show');
      setTimeout(()=>{btn.textContent='📋 Copy';t.classList.remove('show');},2000);
    });

    generate();
  </script>
</body>
</html>
