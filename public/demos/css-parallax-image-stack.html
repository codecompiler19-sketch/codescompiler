<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>2.5D Parallax Parallelogram</title>
  <style>
    body { background: #020617; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden;}
    
    /* The main wrapper sets the extreme 3.5D slash angle! */
    .skew-wrapper {
      position: relative;
      width: 400px;
      height: 500px;
      transform: skew(-15deg);
      cursor: pointer;
    }
    
    /* Base configuration for all 3 layers */
    .slice {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: url('https://images.unsplash.com/photo-1555680202-c86f0e12f086?q=80&w=500&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      border-radius: 10px;
      
      /* Pure CSS logic handles the depth rendering simply via transforms */
      transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.6s ease;
    }
    
    /* Initial Stacking States */
    /* The deepest layer */
    .l-back { opacity: 0.1; transform: translate(30px, 30px); filter: blur(4px); z-index: 1;}
    /* The mid layer */
    .l-mid  { opacity: 0.4; transform: translate(15px, 15px); filter: blur(2px); z-index: 2;}
    /* The top crisp layer */
    .l-front { opacity: 1; transform: translate(0px, 0px); z-index: 3;}
    
    /* The Hover Interaction: Spreading the Parallax! */
    .skew-wrapper:hover .l-back { transform: translate(70px, -20px); opacity: 0.2; }
    .skew-wrapper:hover .l-mid  { transform: translate(35px, -10px); opacity: 0.5; }
    .skew-wrapper:hover .l-front { transform: translate(-10px, 5px); }
  </style>
</head>
<body>
  <div class="skew-wrapper">
    <div class="slice l-back"></div>
    <div class="slice l-mid"></div>
    <div class="slice l-front"></div>
  </div>
</body>
</html>
