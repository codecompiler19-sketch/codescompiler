<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="canonical" href="https://codescompiler.com/blog/css-parallax-image-stack/" />
  <script>
    if (window.self === window.top && window.location.protocol !== 'file:' && !window.location.hostname.includes('localhost') && !window.location.hostname.includes('127.0.0.1')) {
      window.location.replace('/blog-demo/' + window.location.pathname.split('/').pop().replace('.html', '') + '/');
    }
  </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallax Image Stack Slider</title>
    <style>
        body { margin: 0; padding: 0; }
        .parallax-wrapper {
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          min-height: 100vh;
          background-color: #2c3e50;
          font-family: 'Inter', sans-serif;
          color: white;
        }
        .parallax-stack {
          position: relative;
          width: 350px;
          height: 450px;
          perspective: 1000px;
          margin-bottom: 40px;
        }
        .stack-card {
          position: absolute;
          top: 0; left: 0;
          width: 100%; height: 100%;
          border-radius: 20px;
          overflow: hidden;
          box-shadow: 0 15px 35px rgba(0,0,0,0.4);
          transition: transform 0.5s ease, z-index 0s;
          cursor: pointer;
          transform-origin: center center;
        }
        .stack-card img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        
        .stack-card:nth-child(1) { transform: translateZ(-90px) translateY(-30px) rotate(-3deg); z-index: 1; }
        .stack-card:nth-child(2) { transform: translateZ(-60px) translateY(-20px) rotate(2deg); z-index: 2; }
        .stack-card:nth-child(3) { transform: translateZ(-30px) translateY(-10px) rotate(-1deg); z-index: 3; }
        .stack-card:nth-child(4) { transform: translateZ(0) translateY(0) rotate(0deg); z-index: 4; }

        .parallax-stack:hover .stack-card:nth-child(1) { transform: translateX(-150px) translateZ(0) rotate(-10deg); }
        .parallax-stack:hover .stack-card:nth-child(2) { transform: translateX(-50px) translateZ(20px) rotate(-3deg); }
        .parallax-stack:hover .stack-card:nth-child(3) { transform: translateX(50px) translateZ(40px) rotate(3deg); }
        .parallax-stack:hover .stack-card:nth-child(4) { transform: translateX(150px) translateZ(60px) rotate(10deg); }
        
        .instruction { font-size: 14px; opacity: 0.6; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="parallax-wrapper">
      <div class="parallax-stack">
        <div class="stack-card">
          <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&w=500&q=80" alt="Mountain">
        </div>
        <div class="stack-card">
          <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=500&q=80" alt="Beach">
        </div>
        <div class="stack-card">
          <img src="https://images.unsplash.com/photo-1494522855154-9297ac14b55f?auto=format&fit=crop&w=500&q=80" alt="Forest">
        </div>
        <div class="stack-card">
          <img src="https://images.unsplash.com/photo-1448375240586-882707db888b?auto=format&fit=crop&w=500&q=80" alt="Desert">
        </div>
      </div>
      <p class="instruction">Hover to expand, Click to bring to front</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const stack = document.querySelector('.parallax-stack');
            if(!stack) return;
            
            stack.addEventListener('click', (e) => {
                const clickedCard = e.target.closest('.stack-card');
                if (!clickedCard) return;

                stack.appendChild(clickedCard);
                
                clickedCard.style.transform = 'translateY(-50px) scale(1.1)';
                setTimeout(() => {
                    clickedCard.style.transform = '';
                }, 150);
            });
        });
    </script>
</body>
</html>
