<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pomodoro Timer</title>
  <style>
    body { background: #ef4444; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; margin: 0; transition: background 0.5s;}
    .ring { width: 300px; height: 300px; position: relative; }
    svg { transform: rotate(-90deg); width: 100%; height: 100%; }
    circle { fill: transparent; stroke-width: 8; stroke: rgba(255,255,255,0.2); }
    .progress { stroke: white; stroke-dasharray: 880; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear; stroke-linecap: round; }
    .time { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 4rem; font-weight: bold; }
    .controls { margin-top: 40px; display: flex; gap: 20px; }
    button { padding: 12px 30px; font-size: 1.2rem; font-weight: bold; color: #ef4444; background: white; border: none; border-radius: 30px; cursor: pointer; transition: 0.2s;}
    button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
  </style>
</head>
<body>
  <div class="ring">
    <svg><circle cx="150" cy="150" r="140"></circle><circle class="progress" cx="150" cy="150" r="140" id="prog"></circle></svg>
    <div class="time" id="display">25:00</div>
  </div>
  <div class="controls">
    <button onclick="startTimer()">Start</button>
    <button onclick="pauseTimer()">Pause</button>
    <button onclick="resetTimer()">Reset</button>
  </div>
  <script>
    const TOTAL = 25 * 60;
    let time = TOTAL;
    let isRunning = false;
    let interval;
    const disp = document.getElementById('display');
    const prog = document.getElementById('prog');

    function update() {
      const m = Math.floor(time / 60).toString().padStart(2, '0');
      const s = (time % 60).toString().padStart(2, '0');
      disp.innerText = `${m}:${s}`;
      prog.style.strokeDashoffset = 880 - (time / TOTAL) * 880;
    }
    function startTimer() {
      if(isRunning) return; isRunning = true;
      interval = setInterval(() => {
        time--; update();
        if(time <= 0) { clearInterval(interval); alert("Pomodoro complete! Take a break."); }
      }, 1000);
    }
    function pauseTimer() { isRunning = false; clearInterval(interval); }
    function resetTimer() { pauseTimer(); time = TOTAL; update(); }
  </script>
</body>
</html>
