<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Music Player UI</title>
  <style>
    body { background: #fee2e2; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; margin: 0; }
    .player { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 300px; text-align: center; }
    .album-art { width: 100%; height: 250px; background: linear-gradient(135deg, #f43f5e, #fb923c); border-radius: 16px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; color: white; font-size: 5rem;}
    h2 { margin: 0 0 5px; font-size: 20px; color: #111827; }
    p { margin: 0 0 20px; color: #6b7280; font-size: 14px; }
    /* Seek bar */
    .seek-bar { width: 100%; height: 6px; background: #e5e7eb; border-radius: 3px; position: relative; margin-bottom: 20px; }
    .progress { width: 40%; height: 100%; background: #f43f5e; border-radius: 3px; }
    /* Controls */
    .controls { display: flex; justify-content: center; align-items: center; gap: 20px; }
    .btn { background: none; border: none; font-size: 24px; color: #4b5563; cursor: pointer; }
    .play-btn { width: 60px; height: 60px; background: #f43f5e; color: white; border-radius: 50%; font-size: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(244,63,94,0.3);}
    /* Visualizer */
    .visualizer { display: flex; justify-content: center; gap: 4px; height: 30px; margin-bottom: 20px; align-items: flex-end;}
    .bar { width: 4px; background: #f43f5e; border-radius: 2px; }
    .is-playing .bar { animation: eq 1s infinite alternate; }
    .bar:nth-child(2) { animation-delay: 0.2s; }
    .bar:nth-child(3) { animation-delay: 0.4s; }
    .bar:nth-child(4) { animation-delay: 0.6s; }
    @keyframes eq { 0% { height: 5px; } 100% { height: 30px; } }
  </style>
</head>
<body>
  <div class="player is-playing" id="player">
    <div class="album-art">🎵</div>
    <h2>Neon Dreams</h2>
    <p>Synthwave FM</p>
    
    <div class="visualizer">
      <div class="bar" style="height:15px"></div><div class="bar" style="height:25px"></div>
      <div class="bar" style="height:10px"></div><div class="bar" style="height:28px"></div>
      <div class="bar" style="height:20px"></div>
    </div>

    <div class="seek-bar"><div class="progress"></div></div>
    
    <div class="controls">
      <button class="btn">⏮</button>
      <button class="btn play-btn" onclick="toggle()">⏸</button>
      <button class="btn">⏭</button>
    </div>
  </div>
  <script>
    const player = document.getElementById('player');
    const playBtn = document.querySelector('.play-btn');
    function toggle() {
      if(player.classList.contains('is-playing')){
        player.classList.remove('is-playing'); playBtn.innerText = '▶';
      } else {
        player.classList.add('is-playing'); playBtn.innerText = '⏸';
      }
    }
  </script>
</body>
</html>
