<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aurora Text Demo</title>
  <style>
    body { background: #020617; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
    
    .aurora-text {
      font-size: 4rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      
      /* The giant glowing gradient */
      background: linear-gradient(90deg, #38bdf8, #a855f7, #f43f5e, #38bdf8);
      background-size: 300% 100%;
      
      /* Webkit hacks to restrict the gradient ONLY inside the text */
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text; /* standard fallback */
      
      animation: auroraFlow 6s linear infinite;
      
      /* Optional text shadow doesn't clip usually, so we use drop-shadow */
      filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.4));
      cursor: pointer;
      transition: filter 0.3s, transform 0.3s;
    }
    
    .aurora-text:hover {
      filter: drop-shadow(0 0 25px rgba(244, 63, 94, 0.8));
      transform: scale(1.05);
    }
    
    @keyframes auroraFlow {
      to { background-position: 300% 0; }
    }
  </style>
</head>
<body>
  <h1 class="aurora-text">Chase the Northern Lights</h1>
</body>
</html>
