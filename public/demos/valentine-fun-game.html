<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valentine's Memory Game — Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ff6b8a 0%, #c0392b 100%);
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
    }
    .game-header {
      text-align: center;
      margin-bottom: 20px;
      color: #fff;
    }
    .game-header h1 { font-size: clamp(20px, 5vw, 32px); font-weight: 900; margin-bottom: 8px; }
    .game-header p  { font-size: 14px; opacity: 0.85; }
    .stats {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin: 10px 0 18px;
    }
    .stat-box {
      background: rgba(255,255,255,0.25);
      border-radius: 10px;
      padding: 8px 18px;
      text-align: center;
      backdrop-filter: blur(4px);
    }
    .stat-box .label { font-size: 10px; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }
    .stat-box .val   { font-size: 22px; font-weight: 900; }
    .game-board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      max-width: 380px;
      width: 100%;
    }
    .card {
      aspect-ratio: 1;
      perspective: 600px;
      cursor: pointer;
    }
    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 14px;
    }
    .card.flipped .card-inner { transform: rotateY(180deg); }
    .card.matched .card-inner { transform: rotateY(180deg); }
    .card-front, .card-back {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(22px, 6vw, 36px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .card-front {
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.4);
      backdrop-filter: blur(4px);
      color: rgba(255,255,255,0.8);
    }
    .card-back {
      background: #fff;
      transform: rotateY(180deg);
    }
    .card.matched .card-back {
      background: linear-gradient(135deg, #f0fff4, #d1fae5);
      border: 2px solid #34d399;
    }
    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    .btn {
      padding: 10px 28px;
      border: none;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }
    .btn-primary { background: #fff; color: #c0392b; }
    .win-msg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .win-msg.show { display: flex; }
    .win-card {
      background: #fff;
      border-radius: 24px;
      padding: 40px;
      text-align: center;
      animation: pop .3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .win-card h2 { font-size: 32px; margin-bottom: 10px; }
    .win-card p  { color: #6b7280; margin-bottom: 20px; }
    @keyframes pop { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>
  <div class="game-header">
    <h1>💕 Valentine's Memory Game</h1>
    <p>Flip cards and match all the pairs!</p>
    <div class="stats">
      <div class="stat-box"><div class="label">Moves</div><div class="val" id="moves">0</div></div>
      <div class="stat-box"><div class="label">Pairs</div><div class="val"><span id="pairs">0</span>/6</div></div>
    </div>
  </div>

  <div class="game-board" id="gameBoard"></div>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="resetGame()">🔄 New Game</button>
  </div>

  <div class="win-msg" id="winMsg">
    <div class="win-card">
      <div style="font-size:56px">🎉</div>
      <h2>You Won!</h2>
      <p id="winText">You matched all pairs!</p>
      <button class="btn btn-primary" onclick="resetGame();document.getElementById('winMsg').classList.remove('show')">🔄 Play Again</button>
    </div>
  </div>

  <script>
    const emojis = ['💕','🌹','💌','🍫','💖','🎁'];
    let flipped = [], matched = 0, moves = 0, lockBoard = false;

    function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

    function createBoard() {
      const board = document.getElementById('gameBoard');
      board.innerHTML = '';
      shuffle([...emojis, ...emojis]).forEach(emoji => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<div class="card-inner"><div class="card-front">❓</div><div class="card-back">${emoji}</div></div>`;
        card.dataset.emoji = emoji;
        card.addEventListener('click', flipCard);
        board.appendChild(card);
      });
    }

    function flipCard() {
      if (lockBoard || this.classList.contains('flipped') || this.classList.contains('matched')) return;
      this.classList.add('flipped');
      flipped.push(this);
      if (flipped.length === 2) { moves++; document.getElementById('moves').textContent = moves; checkMatch(); }
    }

    function checkMatch() {
      lockBoard = true;
      const [a, b] = flipped;
      if (a.dataset.emoji === b.dataset.emoji) {
        a.classList.add('matched'); b.classList.add('matched');
        matched++;
        document.getElementById('pairs').textContent = matched;
        flipped = []; lockBoard = false;
        if (matched === emojis.length) {
          setTimeout(() => {
            document.getElementById('winText').textContent = `You matched all pairs in ${moves} moves! 💕`;
            document.getElementById('winMsg').classList.add('show');
          }, 400);
        }
      } else {
        setTimeout(() => { a.classList.remove('flipped'); b.classList.remove('flipped'); flipped = []; lockBoard = false; }, 900);
      }
    }

    function resetGame() { matched = moves = 0; flipped = []; lockBoard = false; document.getElementById('moves').textContent = 0; document.getElementById('pairs').textContent = 0; createBoard(); }
    createBoard();
  </script>
</body>
</html>
