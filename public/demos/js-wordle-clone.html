<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wordle Clone Demo</title>
  <style>
    body { background: #121213; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0;}
    h1 { text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #3a3a3c; padding-bottom: 10px; width: 330px; text-align: center;}
    .grid { display: grid; grid-template-rows: repeat(6, 1fr); gap: 5px; margin-bottom: 20px; }
    .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
    .tile { width: 62px; height: 62px; border: 2px solid #3a3a3c; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; text-transform: uppercase; transition: background 0.5s ease; }
    .input-hidden { position: absolute; opacity: 0; pointer-events: none;}
  </style>
</head>
<body>
  <h1>Wordle Clone</h1>
  <div class="grid" id="grid"></div>
  <p style="color: #818384;">Type your guess (Secret is APPLE)</p>
  <script>
    const grid = document.getElementById('grid');
    const target = "APPLE";
    let curRow = 0, curCol = 0, guesses = Array(6).fill("");

    // Setup grid
    for(let r=0; r<6; r++){
      const row = document.createElement('div'); row.className='row';
      for(let c=0; c<5; c++){
        const tile = document.createElement('div'); tile.className='tile'; tile.id = `r${r}c${c}`;
        row.appendChild(tile);
      }
      grid.appendChild(row);
    }

    document.addEventListener('keydown', (e) => {
      if(curRow >= 6) return;
      if(e.key === 'Enter') {
        if(guesses[curRow].length === 5) {
          check(curRow); curRow++; curCol=0;
        }
      } else if (e.key === 'Backspace') {
        if(curCol > 0) { curCol--; guesses[curRow] = guesses[curRow].slice(0, -1); update(); }
      } else if (/^[A-Za-z]$/.test(e.key)) {
        if(curCol < 5) { guesses[curRow] += e.key.toUpperCase(); curCol++; update(); }
      }
    });

    function update() {
      for(let i=0; i<5; i++){
        document.getElementById(`r${curRow}c${i}`).innerText = guesses[curRow][i] || '';
      }
    }

    function check(r) {
      const g = guesses[r];
      for(let i=0; i<5; i++){
        const id = document.getElementById(`r${r}c${i}`);
        if(g[i] === target[i]) id.style.background = '#538d4e';
        else if(target.includes(g[i])) id.style.background = '#b59f3b';
        else id.style.background = '#3a3a3c';
        id.style.borderColor = id.style.background;
      }
    }
  </script>
</body>
</html>
