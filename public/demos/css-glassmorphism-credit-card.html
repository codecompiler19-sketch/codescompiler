<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Glassmorphism Card - Demo</title>
  <style>
    body { 
      background: radial-gradient(circle at 0% 0%, #ff0f7b, #f89b29); 
      display: flex; justify-content: center; align-items: center; 
      min-height: 100vh; font-family: monospace; margin: 0;
      perspective: 1000px;
    }
    .shape1, .shape2 { position: absolute; filter: blur(40px); border-radius: 50%; z-index: -1; }
    .shape1 { width: 250px; height: 250px; background: #6366f1; top: 20%; left: 30%; }
    .shape2 { width: 300px; height: 300px; background: #ec4899; bottom: 10%; right: 25%; }
    
    .credit-card {
      width: 380px; height: 240px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-top: 1px solid rgba(255, 255, 255, 0.5);
      border-left: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 20px 20px 50px rgba(0, 0, 0, 0.3);
      padding: 30px; color: white; display: flex; flex-direction: column; justify-content: space-between;
      transition: transform 0.5s;
    }
    .credit-card:hover { transform: translateY(-10px) rotateX(10deg) rotateY(10deg); }
    .chip { width: 50px; height: 35px; background: rgba(255,255,255,0.3); border-radius: 5px; }
    .number { font-size: 22px; letter-spacing: 4px; margin-top: 20px; }
    .details { display: flex; justify-content: space-between; align-items: flex-end; }
    .label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; }
    .value { font-size: 14px; letter-spacing: 2px; margin-top: 5px; text-transform: uppercase;}
    .mastercard-logo { width: 50px; height: 30px; position: relative; }
    .circle { width: 30px; height: 30px; border-radius: 50%; position: absolute; }
    .circle.red { background: rgba(235, 0, 27, 0.8); left: 0; }
    .circle.orange { background: rgba(247, 158, 27, 0.8); left: 20px; }
  </style>
</head>
<body>
  <div class="shape1"></div>
  <div class="shape2"></div>
  
  <div class="credit-card">
    <div class="header">
      <div class="chip"></div>
    </div>
    <div class="number">4532 8921 7364 0021</div>
    <div class="details">
      <div>
        <div class="label">Card Holder</div>
        <div class="value">John Doe</div>
      </div>
      <div>
        <div class="label">Expires</div>
        <div class="value">12/28</div>
      </div>
      <div class="mastercard-logo">
        <div class="circle red"></div>
        <div class="circle orange"></div>
      </div>
    </div>
  </div>
</body>
</html>
