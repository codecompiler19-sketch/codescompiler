<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Magnetic Button Demo</title>
  <style>
    body { background: #0f172a; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; }
    .magnet-btn { padding: 20px 40px; font-size: 1.2rem; font-weight: bold; background: #38bdf8; color: white; border: none; border-radius: 50px; cursor: pointer; transition: transform 0.1s ease, box-shadow 0.3s; box-shadow: 0 10px 20px rgba(56,189,248,0.3); }
    .magnet-btn:hover { box-shadow: 0 15px 30px rgba(56,189,248,0.5); }
  </style>
</head>
<body>
  <button class="magnet-btn">Hover Near Me</button>
  <script>
    const magnet = document.querySelector('.magnet-btn');
    magnet.addEventListener('mousemove', (e) => {
      const position = magnet.getBoundingClientRect();
      const x = e.clientX - position.left - position.width / 2;
      const y = e.clientY - position.top - position.height / 2;
      magnet.style.transform = `translate(${x * 0.4}px, ${y * 0.4}px)`;
    });
    magnet.addEventListener('mouseleave', () => {
      magnet.style.transform = 'translate(0px, 0px)';
      magnet.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
      setTimeout(() => magnet.style.transition = 'transform 0.1s ease', 500);
    });
  </script>
</body>
</html>
