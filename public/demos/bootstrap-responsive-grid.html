<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap Grid</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style> 
    body { padding: 40px; }
    .box { background: #e0e7ff; border: 1px solid #818cf8; padding: 30px; text-align: center; border-radius: 8px; font-weight: bold; color: #4f46e5; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="container text-center mb-5">
    <h1>Resize Your Browser</h1>
    <p class="lead">Watch the grid dynamically collapse on mobile screens!</p>
  </div>

  <div class="container">
    <h4 class="mb-3">3-Column Grid (Stacks on Mobile)</h4>
    <div class="row">
      <div class="col-12 col-md-4"><div class="box">.col-md-4</div></div>
      <div class="col-12 col-md-4"><div class="box">.col-md-4</div></div>
      <div class="col-12 col-md-4"><div class="box">.col-md-4</div></div>
    </div>
    
    <h4 class="mb-3 mt-4">2-Column Grid (6 & 6)</h4>
    <div class="row">
      <div class="col-12 col-lg-6"><div class="box">.col-lg-6</div></div>
      <div class="col-12 col-lg-6"><div class="box">.col-lg-6</div></div>
    </div>
  </div>
</body>
</html>
