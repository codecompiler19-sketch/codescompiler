<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ripple Pond Demo</title>
  <style>
    body { background: #e2e8f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif;}
    
    .pond-card {
      width: 300px;
      height: 400px;
      /* Deep water colors */
      background: radial-gradient(circle at 50% 50%, #0369a1, #082f49);
      border-radius: 20px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    
    h2 { z-index: 10; font-weight: normal; letter-spacing: 2px;}
    
    /* The Ripples */
    .ripple {
      position: absolute;
      /* centered by default */
      top: 50%; left: 50%;
      width: 20px; height: 20px;
      margin: -10px 0 0 -10px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.7);
      opacity: 0;
    }
    
    /* Sequence them */
    .pond-card:hover .ripple { animation: splash 4s ease-out infinite; }
    .pond-card:hover .ripple:nth-child(2) { animation-delay: 0.8s; }
    .pond-card:hover .ripple:nth-child(3) { animation-delay: 1.6s; }
    
    @keyframes splash {
      0%   { transform: scale(1); opacity: 1; border-width: 3px;}
      100% { transform: scale(30); opacity: 0; border-width: 0px;}
    }
    
    /* To make it follow the mouse, we would need JS, but pure CSS means
       we can at least launch it from fixed anchor points (center). */
  </style>
</head>
<body>
  <div class="pond-card">
    <div class="ripple"></div>
    <div class="ripple"></div>
    <div class="ripple"></div>
    <h2>Dive In</h2>
  </div>
</body>
</html>
