<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pricing Calculator - Demo</title>
  <style>
    body { background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; margin: 0; }
    .calculator-card { background: #1e293b; padding: 40px; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 400px; text-align: center; }
    h3 { margin-bottom: 40px; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; font-size: 14px; }
    
    .slider-container { margin-bottom: 40px; text-align: center; }
    input[type=range] { width: 100%; -webkit-appearance: none; background: #334155; height: 8px; border-radius: 4px; outline: none; margin-top: 15px;}
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 24px; height: 24px; border-radius: 50%; background: #38bdf8; cursor: pointer; box-shadow: 0 0 15px rgba(56, 189, 248, 0.5); }
    #usersVal { font-size: 24px; font-weight: bold; }

    .billing-toggle { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 40px; font-size: 14px; color: #cbd5e1; }
    .discount { background: #fca5a5; color: #991b1b; padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; margin-left: 5px; }
    
    /* Toggle Switch */
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider.round { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 24px; }
    .slider.round:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider.round { background-color: #38bdf8; }
    input:checked + .slider.round:before { transform: translateX(20px); }

    .price-display { border-top: 1px solid #334155; padding-top: 30px; }
    .currency { font-size: 24px; vertical-align: top; color: #94a3b8; }
    .price { font-size: 64px; font-weight: 800; letter-spacing: -2px; color: white; }
    .period { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="calculator-card">
    <h3>Calculate your price</h3>
    <div class="slider-container">
      <label for="usersSlider" id="usersVal">100 Users</label>
      <input type="range" id="usersSlider" min="10" max="1000" step="10" value="100">
    </div>
    <div class="billing-toggle">
      <span>Monthly</span>
      <label class="switch">
        <input type="checkbox" id="annualToggle">
        <span class="slider round"></span>
      </label>
      <span>Annually <span class="discount">-20%</span></span>
    </div>
    <div class="price-display">
      <span class="currency">$</span>
      <span class="price" id="totalPrice">49.00</span>
      <span class="period">/mo</span>
    </div>
  </div>

  <script>
    const s = document.getElementById('usersSlider');
    const t = document.getElementById('annualToggle');
    const p = document.getElementById('totalPrice');
    const v = document.getElementById('usersVal');
    
    function calc() {
      v.innerText = `${s.value} Users`;
      let cost = parseInt(s.value) * 0.50; // $0.50 per user
      if (t.checked) cost *= 0.8; // 20% discount
      p.innerText = cost.toFixed(2);
    }
    
    s.addEventListener('input', calc);
    t.addEventListener('change', calc);
    calc();
  </script>
</body>
</html>
