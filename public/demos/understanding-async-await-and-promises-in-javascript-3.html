<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Async/Await & Promises | Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
    
    body { background: #0f172a; color: #f8fafc; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

    .container { max-width: 800px; width: 100%; }
    
    header { text-align: center; margin-bottom: 40px; }
    h1 { font-size: 2.5rem; color: #38bdf8; margin-bottom: 10px; }
    p.subtitle { color: #94a3b8; font-size: 1.1rem; }

    .demo-panel {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 30px;
    }

    .controls { display: flex; gap: 15px; margin-bottom: 20px; }
    
    .btn {
      background: #3b82f6; color: white; border: none;
      padding: 12px 24px; border-radius: 8px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; font-size: 1rem;
    }
    .btn:hover { background: #2563eb; transform: translateY(-2px); }
    .btn:disabled { background: #475569; cursor: not-allowed; transform: none; }

    .btn-secondary { background: #8b5cf6; }
    .btn-secondary:hover { background: #7c3aed; }
    
    .btn-danger { background: #ef4444; }
    .btn-danger:hover { background: #dc2626; }

    /* Output Area */
    .output-box {
      background: #020617;
      border-radius: 8px;
      padding: 20px;
      min-height: 150px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-family: 'Fira Code', monospace;
      color: #a5b4fc;
      overflow-y: auto;
      max-height: 300px;
    }

    .log { padding: 8px; border-radius: 4px; background: rgba(255,255,255,0.05); border-left: 3px solid #38bdf8; }
    .log.success { border-left-color: #10b981; color: #a7f3d0; background: rgba(16, 185, 129, 0.1); }
    .log.error { border-left-color: #ef4444; color: #fca5a5; background: rgba(239, 68, 68, 0.1); }
    .log.loading { border-left-color: #f59e0b; color: #fcd34d; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Async JavaScript Playground</h1>
      <p class="subtitle">Simulate fetching data from a server using Promises and Async/Await.</p>
    </header>

    <div class="demo-panel">
      <div class="controls">
        <button class="btn" id="btnPromise">Fetch with Promises (.then)</button>
        <button class="btn btn-secondary" id="btnAsync">Fetch with Async/Await</button>
        <button class="btn btn-danger" id="btnError">Simulate Network Error</button>
      </div>

      <div class="output-box" id="output">
        <div class="log" style="color: #64748b; border-color: #475569;">// Output terminal ready... Click a button above.</div>
      </div>
    </div>
  </div>

  <script>
    const output = document.getElementById('output');
    const btnPromise = document.getElementById('btnPromise');
    const btnAsync = document.getElementById('btnAsync');
    const btnError = document.getElementById('btnError');

    // Utility to write to our "terminal"
    function addLog(message, type = 'normal') {
      const div = document.createElement('div');
      div.className = `log ${type}`;
      
      if (type === 'loading') {
        div.innerHTML = `<span class="spinner"></span> ${message}`;
      } else {
        div.textContent = message;
      }
      
      output.appendChild(div);
      output.scrollTop = output.scrollHeight; // Auto-scroll to bottom
      return div; // Return so we can modify it later if needed (like removing a spinner)
    }

    function clearLogs() {
      output.innerHTML = '';
    }

    function disableButtons(disable) {
      btnPromise.disabled = disable;
      btnAsync.disabled = disable;
      btnError.disabled = disable;
    }

    // --- MOCK API FUNCTION ---
    // Returns a Promise that resolves after 2 seconds
    function mockFetchUserData(shouldFail = false) {
      return new Promise((resolve, reject) => {
        setTimeout(() => {
          if (shouldFail) {
            reject(new Error("500 Internal Server Error: Database connection failed."));
          } else {
            resolve({ id: 1, username: "john_doe", role: "Admin" });
          }
        }, 2000);
      });
    }

    // --- 1. USING PROMISES (.then / .catch) ---
    btnPromise.addEventListener('click', () => {
      clearLogs();
      disableButtons(true);
      
      const loadingLog = addLog("Sending request to server...", "loading");

      mockFetchUserData(false)
        .then(data => {
          loadingLog.remove(); // Remove spinner
          addLog("✅ Request successful! Status: 200", "success");
          addLog(`Data received: ${JSON.stringify(data)}`);
        })
        .catch(error => {
          loadingLog.remove();
          addLog(`❌ Error: ${error.message}`, "error");
        })
        .finally(() => {
          addLog("Connection closed.");
          disableButtons(false);
        });
    });

    // --- 2. USING ASYNC/AWAIT (Try / Catch) ---
    btnAsync.addEventListener('click', async () => {
      clearLogs();
      disableButtons(true);
      
      const loadingLog = addLog("Sending request to server using await...", "loading");

      try {
        // Code pauses here until the Promise resolves!
        const data = await mockFetchUserData(false);
        
        loadingLog.remove();
        addLog("✅ Request successful! Status: 200", "success");
        addLog(`Data received: ${JSON.stringify(data)}`);
        
      } catch (error) {
        loadingLog.remove();
        addLog(`❌ Error: ${error.message}`, "error");
        
      } finally {
        addLog("Connection closed.");
        disableButtons(false);
      }
    });

    // --- 3. SIMULATING AN ERROR ---
    btnError.addEventListener('click', async () => {
      clearLogs();
      disableButtons(true);
      
      const loadingLog = addLog("Sending request (Will trigger error)...", "loading");

      try {
        const data = await mockFetchUserData(true); // Pass 'true' to force rejection
        // We will never reach here!
      } catch (error) {
        loadingLog.remove();
        addLog(`💥 Request Failed! Caught exception.`, "error");
        addLog(`${error.message}`, "error");
      } finally {
        addLog("Connection closed.");
        disableButtons(false);
      }
    });

  </script>

</body>
</html>
