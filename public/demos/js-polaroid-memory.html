<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Polaroid Wall Demo</title>
  <style>
    body { background: #f4f4f5; display: flex; flex-wrap: wrap; justify-content: center; padding: 40px; gap: 30px; font-family: 'Comic Sans MS', cursive, sans-serif; margin: 0; overflow-x: hidden; }
    h1 { position: absolute; top: 0; left: 0; width: 100%; text-align: center; color: #9ca3af; font-family: sans-serif; letter-spacing: 2px;}
    .polaroid { width: 220px; background: white; padding: 15px 15px 40px 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border-radius: 4px; border: 1px solid #e5e7eb; cursor: grab; transition: transform 0.2s; position: relative;}
    .polaroid:hover { transform: scale(1.05); z-index: 10;}
    .polaroid:active { cursor: grabbing; }
    .film { width: 100%; height: 260px; background: #111; overflow: hidden; position: relative;}
    .film img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 6s linear;}
    .polaroid.dev .film img { opacity: 1; }
    .caption { text-align: center; font-size: 1.2rem; color: #333; margin-top: 15px; min-height: 25px; opacity: 0; transition: opacity 1s; transition-delay: 4s;}
    .polaroid.dev .caption { opacity: 1; }
  </style>
</head>
<body>
  <h1>Double click to develop!</h1>
  
  <div class="polaroid" style="transform: rotate(-3deg); margin-top: 60px;" ondblclick="this.classList.add('dev')">
    <div class="film"><img src="https://source.unsplash.com/random/400x500/?nature" alt=""></div>
    <div class="caption">Summer 2026 🌿</div>
  </div>
  <div class="polaroid" style="transform: rotate(4deg); margin-top: 80px;" ondblclick="this.classList.add('dev')">
    <div class="film"><img src="https://source.unsplash.com/random/400x500/?city" alt=""></div>
    <div class="caption">Lights... 🌃</div>
  </div>
  <div class="polaroid" style="transform: rotate(-5deg); margin-top: 70px;" ondblclick="this.classList.add('dev')">
    <div class="film"><img src="https://source.unsplash.com/random/400x500/?coffee" alt=""></div>
    <div class="caption">Morning Fuel ☕</div>
  </div>

  <script>
    // Extremely rudimentary drag just for demo
    let dragged;
    document.querySelectorAll('.polaroid').forEach(p => {
      p.addEventListener('mousedown', e => { 
        if(e.detail === 2) return; // ignore dbl click
        dragged = p; 
        p.style.zIndex = 100;
      });
    });
    window.addEventListener('mouseup', () => { if(dragged) dragged.style.zIndex = ''; dragged = null; });
    window.addEventListener('mousemove', e => {
      if(dragged) {
        dragged.style.transform = `translate(${e.movementX*2}px, ${e.movementY*2}px) ${dragged.style.transform}`;
      }
    });
  </script>
</body>
</html>
