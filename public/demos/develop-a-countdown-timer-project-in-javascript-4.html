<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="canonical" href="https://codescompiler.com/blog/develop-a-countdown-timer-project-in-javascript-4/" />
  <script>
    if (window.self === window.top) {
      window.location.replace('/blog-demo/' + window.location.pathname.split('/').pop().replace('.html', '') + '/');
    }
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Timer | Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Space Grotesk', sans-serif;
    }
    
    body {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }
    
    .timer-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 3rem;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      width: 100%;
      max-width: 600px;
    }

    .title {
      font-size: 2rem;
      margin-bottom: 2rem;
      background: linear-gradient(to right, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .countdown-wrapper {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
    }

    .time-box {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .time-value {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 16px;
      width: 90px;
      height: 100px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 3rem;
      font-weight: 700;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
    }

    .time-label {
      margin-top: 10px;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #94a3b8;
    }

    .controls {
      margin-top: 2.5rem;
      display: flex;
      justify-content: center;
      gap: 1rem;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-start {
      background: #3b82f6;
      color: white;
    }
    
    .btn-start:hover { background: #2563eb; }

    .btn-reset {
      background: transparent;
      color: #cbd5e1;
      border: 1px solid #475569;
    }
    
    .btn-reset:hover { background: rgba(255,255,255,0.1); }

    /* Input section */
    .input-section {
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    input[type="datetime-local"] {
      padding: 10px 15px;
      border-radius: 8px;
      border: 1px solid #475569;
      background: rgba(0,0,0,0.2);
      color: white;
      font-family: inherit;
      outline: none;
    }

    input[type="datetime-local"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
    }

    @media (max-width: 600px) {
      .countdown-wrapper { gap: 0.5rem; }
      .time-value { width: 70px; height: 80px; font-size: 2rem; }
      .timer-card { padding: 2rem 1rem; }
    }
  </style>
</head>
<body>

  <div class="timer-card">
    <h1 class="title" id="eventTitle">Launch Countdown</h1>
    
    <div class="countdown-wrapper">
      <div class="time-box">
        <div class="time-value" id="days">00</div>
        <div class="time-label">Days</div>
      </div>
      <div class="time-box">
        <div class="time-value" id="hours">00</div>
        <div class="time-label">Hours</div>
      </div>
      <div class="time-box">
        <div class="time-value" id="minutes">00</div>
        <div class="time-label">Mins</div>
      </div>
      <div class="time-box">
        <div class="time-value" id="seconds">00</div>
        <div class="time-label">Secs</div>
      </div>
    </div>

    <div class="input-section">
      <label for="targetDate" style="color:#94a3b8; font-size: 0.9rem;">Set a target date:</label>
      <input type="datetime-local" id="targetDate">
      <div class="controls">
        <button class="btn btn-start" id="startBtn">Start Timer</button>
        <button class="btn btn-reset" id="resetBtn">Reset</button>
      </div>
    </div>
  </div>

  <script>
    // Set a default date (10 days from now)
    const defaultDate = new Date();
    defaultDate.setDate(defaultDate.getDate() + 10);
    
    // Format date for input
    const tzoffset = (new Date()).getTimezoneOffset() * 60000;
    const localISOTime = (new Date(defaultDate - tzoffset)).toISOString().slice(0, 16);
    document.getElementById('targetDate').value = localISOTime;

    let countdownInterval;
    let targetTime = defaultDate.getTime();

    const elements = {
      days: document.getElementById('days'),
      hours: document.getElementById('hours'),
      minutes: document.getElementById('minutes'),
      seconds: document.getElementById('seconds')
    };

    function updateTimer() {
      const now = new Date().getTime();
      const difference = targetTime - now;

      if (difference <= 0) {
        clearInterval(countdownInterval);
        document.getElementById('eventTitle').textContent = "Event Started!";
        Object.values(elements).forEach(el => el.textContent = "00");
        return;
      }

      // Calculations
      const days = Math.floor(difference / (1000 * 60 * 60 * 24));
      const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((difference % (1000 * 60)) / 1000);

      // DOM Updates with zero padding
      elements.days.textContent = days.toString().padStart(2, '0');
      elements.hours.textContent = hours.toString().padStart(2, '0');
      elements.minutes.textContent = minutes.toString().padStart(2, '0');
      elements.seconds.textContent = seconds.toString().padStart(2, '0');
    }

    document.getElementById('startBtn').addEventListener('click', () => {
      const inputDate = document.getElementById('targetDate').value;
      if (!inputDate) return;
      
      targetTime = new Date(inputDate).getTime();
      document.getElementById('eventTitle').textContent = "Counting Down...";
      
      clearInterval(countdownInterval);
      updateTimer(); // Initial call
      countdownInterval = setInterval(updateTimer, 1000);
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      clearInterval(countdownInterval);
      document.getElementById('eventTitle').textContent = "Timer Reset";
      Object.values(elements).forEach(el => el.textContent = "00");
    });

    // Start by default
    updateTimer();
    countdownInterval = setInterval(updateTimer, 1000);
  </script>
</body>
</html>
