<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flashcards Demo</title>
  <style>
    body { background: #fdf2f8; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .card-container { perspective: 1000px; cursor: pointer; }
    .card { width: 400px; height: 250px; position: relative; transition: transform 0.6s; transform-style: preserve-3d; }
    .card.flipped { transform: rotateY(180deg); }
    .front, .back { width: 100%; height: 100%; position: absolute; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; text-align: center; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); font-size: 24px; font-weight: bold; color: #1f2937; }
    .front { background: white; }
    .back { background: #ec4899; color: white; transform: rotateY(180deg); }
    .controls { margin-top: 30px; display: flex; gap: 20px;}
    button { padding: 10px 20px; border-radius: 8px; border: none; background: #ec4899; color: white; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card-container" onclick="this.querySelector('.card').classList.toggle('flipped')">
    <div class="card" id="card">
      <div class="front" id="front">What is Closure in JavaScript?</div>
      <div class="back" id="back">A function bundled together with its lexical environment.</div>
    </div>
  </div>
  <div class="controls">
    <button onclick="prev()">← Prev</button>
    <button onclick="next()">Next →</button>
  </div>
  <script>
    const deck = [
      { q: "What is Closure in JavaScript?", a: "A function bundled with its lexical environment." },
      { q: "What does CSS stand for?", a: "Cascading Style Sheets" },
      { q: "HTML is a programming language.", a: "False. It is a markup language." }
    ];
    let idx = 0;
    const c = document.getElementById('card'), f = document.getElementById('front'), b = document.getElementById('back');
    function load() { c.classList.remove('flipped'); setTimeout(() => { f.innerText = deck[idx].q; b.innerText = deck[idx].a; }, 150); }
    function next() { idx = (idx + 1) % deck.length; load(); }
    function prev() { idx = (idx - 1 + deck.length) % deck.length; load(); }
  </script>
</body>
</html>
