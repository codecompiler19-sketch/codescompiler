<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Enchanted Mirror Card</title>
  <style>
    body { background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif;}
    
    .card-wrap {
      perspective: 1000px;
    }
    
    .card {
      width: 250px;
      height: 350px;
      background: url('https://source.unsplash.com/random/250x350/?fantasy') center/cover;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      position: relative;
      z-index: 2;
      transition: transform 0.6s ease;
      cursor: pointer;
      display: flex;
      align-items: flex-end;
      padding: 20px;
      color: white;
    }
    .card h2 { margin: 0; text-shadow: 0 2px 10px black;}
    
    .card-wrap:hover .card { transform: translateY(-10px); }
    
    /* The Magical Reflection */
    .reflection {
      width: 250px;
      height: 350px;
      background: url('https://source.unsplash.com/random/250x350/?fantasy') center/cover;
      border-radius: 12px;
      position: absolute;
      top: 100%;
      left: 0;
      transform: scaleY(-1) translateY(-10px); /* Flip and stick to bottom */
      opacity: 0.3;
      filter: blur(4px);
      z-index: 1;
      transition: all 0.6s ease;
      pointer-events: none;
    }
    
    .card-wrap:hover .reflection {
      opacity: 0.6;
      filter: blur(2px);
      transform: scaleY(-1) translateY(-20px) rotateX(10deg);
    }
    
    /* Gradient mask to fade out the reflection into the floor */
    .reflection::after {
      content: '';
      position: absolute;
      inset: -1px;
      background: linear-gradient(to bottom, rgba(15, 23, 42, 0.2) 0%, rgba(15, 23, 42, 1) 90%);
    }
  </style>
</head>
<body>
  <div class="card-wrap">
    <div class="card">
      <h2>Enchanted</h2>
    </div>
    <div class="reflection"></div>
  </div>
</body>
</html>
