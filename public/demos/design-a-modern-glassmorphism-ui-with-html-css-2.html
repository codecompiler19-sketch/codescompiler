<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Glassmorphism UI | Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #161623;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: linear-gradient(#ffc107, #e91e63);
      border-radius: 50%;
      transform: translate(-250px, -120px);
      box-shadow: 0 0 50px rgba(233, 30, 99, 0.5);
      animation: float 6s ease-in-out infinite;
    }
    body::after {
      content: '';
      position: absolute;
      width: 350px;
      height: 350px;
      background: linear-gradient(#2196f3, #31ff38);
      border-radius: 50%;
      transform: translate(250px, 150px);
      box-shadow: 0 0 50px rgba(33, 150, 243, 0.5);
      animation: float 6s ease-in-out infinite;
      animation-delay: -3s;
    }

    @keyframes float {
      0%, 100% { transform: translate(-250px, -120px); }
      50% { transform: translate(-250px, -140px); }
    }
    body::after {
      animation: float2 6s ease-in-out infinite;
    }
    @keyframes float2 {
      0%, 100% { transform: translate(250px, 150px); }
      50% { transform: translate(250px, 170px); }
    }

    .glass-card {
      position: relative;
      width: 500px;
      height: 300px;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      z-index: 10;
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 0.3s ease;
      overflow: hidden;
    }
    
    .glass-card:hover {
      transform: translateY(-10px);
    }

    /* Glossy shine effect */
    .glass-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 50%;
      height: 100%;
      background: linear-gradient(to right, rgba(255,255,255,0.05), rgba(255,255,255,0));
      transform: skewX(-20deg) translateX(-150%);
      transition: 0.5s;
    }
    .glass-card:hover::before {
      transform: skewX(-20deg) translateX(250%);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 2px;
    }
    .chip {
      width: 50px;
      height: 35px;
      background: linear-gradient(135deg, #e3c155 0%, #ad8718 100%);
      border-radius: 8px;
      position: relative;
    }
    .chip::before {
      content: '';
      position: absolute;
      top: 15px; left: 0; right: 0;
      height: 2px;
      background: rgba(0,0,0,0.2);
    }
    .chip::after {
      content: '';
      position: absolute;
      left: 15px; top: 0; bottom: 0;
      width: 2px;
      background: rgba(0,0,0,0.2);
    }

    .card-details {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .card-number {
      color: #fff;
      font-size: 28px;
      letter-spacing: 4px;
      font-family: 'Courier New', Courier, monospace;
      text-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      color: #fff;
    }
    .card-footer .group {
      display: flex;
      flex-direction: column;
    }
    .card-footer .group span:first-child {
      font-size: 10px;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 3px;
      opacity: 0.8;
    }
    .card-footer .group span:last-child {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 2px;
    }

    /* Small dots decor */
    .dots {
      position: absolute;
      top: 30px;
      right: 30px;
      display: flex;
      gap: 5px;
    }
    .dots span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .dots span:nth-child(1) { background: #ff3e3e; }
    .dots span:nth-child(2) { background: #ffb900; }

    @media (max-width: 600px) {
      .glass-card {
        width: 90%;
        height: auto;
        min-height: 250px;
        padding: 20px;
      }
      .card-number { font-size: 22px; }
      body::before { width: 300px; height: 300px; transform: translate(-150px, -100px); }
      body::after { width: 250px; height: 250px; transform: translate(150px, 120px); }
      
      @keyframes float {
        0%, 100% { transform: translate(-150px, -100px); }
        50% { transform: translate(-150px, -120px); }
      }
      @keyframes float2 {
        0%, 100% { transform: translate(150px, 120px); }
        50% { transform: translate(150px, 140px); }
      }
    }
  </style>
</head>
<body>

  <div class="glass-card">
    <div class="dots">
      <span></span>
      <span></span>
    </div>
    
    <div class="card-header">
      <div class="logo">VISA</div>
      <div class="chip"></div>
    </div>

    <div class="card-details">
      <div class="card-number">4000 1234 5678 9010</div>
    </div>

    <div class="card-footer">
      <div class="group">
        <span>Card Holder</span>
        <span>ALEXANDER SMITH</span>
      </div>
      <div class="group">
        <span>Expires</span>
        <span>12/28</span>
      </div>
    </div>
  </div>

</body>
</html>
