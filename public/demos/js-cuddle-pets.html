<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cuddle Creature Demo</title>
  <style>
    body { background: #fdf2f8; margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif;}
    h1 { color: #db2777; }
    .creature { width: 120px; height: 120px; background: #f9a8d4; border-radius: 50% 50% 40% 40%; position: relative; display: flex; justify-content: center; align-items: center; border: 4px solid #db2777; transition: transform 0.2s;}
    .eye { width: 25px; height: 25px; background: white; border-radius: 50%; box-shadow: inset 0 0 0 2px #db2777; position: absolute; top: 35px;}
    .eye.left { left: 25px; } .eye.right { right: 25px; }
    .pupil { width: 12px; height: 12px; background: #333; border-radius: 50%; position: absolute; margin: auto; inset: 0; transition: transform 0.1s; transform-origin: center;}
    .mouth { position: absolute; top: 70px; font-size: 1.5rem; font-weight: bold; color: #db2777;}
    
    .zzz { position: absolute; top: -20px; right: 0; font-size: 1.5rem; font-weight: bold; color: #9da4b0; opacity: 0;}
    @keyframes snore { 0% { transform: translate(0,0) scale(0.5); opacity: 0; } 50% { opacity: 1; } 100% { transform: translate(20px, -40px) scale(1.5); opacity: 0; } }
  </style>
</head>
<body>
  <h1>Adoption Center</h1>
  <div class="creature" id="pet">
    <div class="zzz" id="zzz">Z</div>
    <div class="eye left"><div class="pupil"></div></div>
    <div class="eye right"><div class="pupil"></div></div>
    <div class="mouth" id="mouth">w</div>
  </div>
  <p style="color: #9ca3af; margin-top: 30px;">Move your mouse around. Stop for 5 seconds to sleep.</p>

  <script>
    const pet = document.getElementById('pet');
    const pupils = document.querySelectorAll('.pupil');
    const mouth = document.getElementById('mouth');
    const zzz = document.getElementById('zzz');
    let idleTimer;

    function wake() {
      zzz.style.animation = 'none'; zzz.style.opacity = 0;
      mouth.innerText = 'w';
      pet.style.transform = 'scale(1)';
    }
    
    function sleep() {
      zzz.style.animation = 'snore 3s infinite linear';
      mouth.innerText = '-';
      pupils.forEach(p => p.style.transform = `translate(0px, 0px)`);
      pet.style.transform = 'scale(1.05) scaleY(0.95)'; // squat
    }

    window.addEventListener('mousemove', (e) => {
      clearTimeout(idleTimer);
      wake();
      
      const rect = pet.getBoundingClientRect();
      const pcX = rect.left + rect.width / 2;
      const pcY = rect.top + rect.height / 2;
      
      const angle = Math.atan2(e.clientY - pcY, e.clientX - pcX);
      
      // Move pupil
      const dist = 5;
      const vx = Math.cos(angle) * dist;
      const vy = Math.sin(angle) * dist;
      
      pupils.forEach(p => p.style.transform = `translate(${vx}px, ${vy}px)`);
      
      idleTimer = setTimeout(sleep, 5000);
    });
    idleTimer = setTimeout(sleep, 5000);
  </script>
</body>
</html>
