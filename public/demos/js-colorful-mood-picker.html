<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Colorful Mood Picker Demo</title>
  <style>
    :root { --bg: #f8fafc; }
    body { background: var(--bg); transition: background 1s ease; margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: sans-serif;}
    h1 { color: #334155; margin-bottom: 50px; font-weight: normal; letter-spacing: 2px;}
    .faces { display: flex; gap: 20px; }
    .face { font-size: 4rem; cursor: pointer; transition: 0.2s; filter: grayscale(50%);}
    .face:hover { transform: scale(1.3); filter: grayscale(0%);}
    .msg { margin-top: 50px; font-size: 1.5rem; color: #475569; min-height: 40px; font-style: italic; opacity: 0; transition: 1s;}
  </style>
</head>
<body>
  <h1>How are you feeling?</h1>
  <div class="faces">
    <div class="face" onclick="setMood('#fbcfe8', 'You radiate joy!')">😄</div>
    <div class="face" onclick="setMood('#bae6fd', 'Peaceful and calm.')">😌</div>
    <div class="face" onclick="setMood('#fde047', 'Shine bright!')">😎</div>
    <div class="face" onclick="setMood('#e2e8f0', 'Rest well, friend.')">😴</div>
    <div class="face" onclick="setMood('#fca5a5', 'Take a deep breath. You got this.')">🥺</div>
  </div>
  <div class="msg" id="msg"></div>

  <script>
    function setMood(color, text) {
      document.documentElement.style.setProperty('--bg', color);
      const m = document.getElementById('msg');
      m.innerText = text;
      m.style.opacity = 1;
      localStorage.setItem('savedMood', color);
      localStorage.setItem('savedText', text);
    }
    
    // Hydrate
    const c = localStorage.getItem('savedMood');
    const t = localStorage.getItem('savedText');
    if(c && t) { setTimeout(()=> setMood(c, t), 500); }
  </script>
</body>
</html>
