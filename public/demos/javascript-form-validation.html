<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Form Validation - Demo</title>
  <style>
    body { background: #f3f4f6; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 40px; }
    .form { background: #fff; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    h2 { text-align: center; margin-bottom: 20px; }
    .form-group { margin-bottom: 15px; position: relative; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input { width: 100%; padding: 10px; border: 2px solid #e1e5eb; border-radius: 8px; outline: none; }
    input:focus { border-color: #3b82f6; }
    .form-group.error input { border-color: #ef4444; }
    .form-group.success input { border-color: #10b981; }
    small { color: #ef4444; visibility: hidden; }
    .form-group.error small { visibility: visible; }
    button { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    button:hover { background: #2563eb; }
  </style>
</head>
<body>
  <form class="form" id="regForm">
    <h2>Create Account</h2>
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter username">
      <small class="error-text">Error message</small>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="john@example.com">
      <small class="error-text">Error message</small>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Min 8 characters">
      <small class="error-text">Error message</small>
    </div>
    <button type="submit">Sign Up</button>
  </form>

  <script>
    const form = document.getElementById('regForm');
    const u = document.getElementById('username');
    const e = document.getElementById('email');
    const p = document.getElementById('password');

    function showError(input, msg) {
      input.parentElement.className = 'form-group error';
      input.parentElement.querySelector('small').innerText = msg;
    }
    function showSuccess(input) { input.parentElement.className = 'form-group success'; }

    u.addEventListener('input', () => { u.value.length < 3 ? showError(u, 'Username needs 3+ chars') : showSuccess(u); });
    p.addEventListener('input', () => { p.value.length < 8 ? showError(p, 'Password needs 8+ chars') : showSuccess(p); });
    e.addEventListener('input', () => { 
      /^[^@]+@[^@]+\.[^@]+$/.test(e.value) ? showSuccess(e) : showError(e, 'Valid email required');
    });

    form.addEventListener('submit', (ev) => {
      ev.preventDefault();
      if(u.parentElement.classList.contains('success') && p.parentElement.classList.contains('success') && e.parentElement.classList.contains('success')) {
        alert('Form Submitted successfully!');
      }
    });
  </script>
</body>
</html>
